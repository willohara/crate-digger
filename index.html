<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crate Digger</title>
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Courier+Prime:wght@400;700&family=Special+Elite&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1e1a14;
    --surface: #28231a;
    --surface2: #302a1f;
    --cardboard: #a8894a;
    --cardboard-dark: #7a6332;
    --cardboard-light: #c4a45a;
    --paper: #d8ccb0;
    --paper-dim: #8a7e68;
    --ink: #1e1a14;
    --red: #b83a2e;
    --green-dim: #4a6a3a;
    --spotify-green: #1db954;
    --youtube-red: #ff0033;
    --border: #3a3228;
    --border-light: #4a4030;
    --stain1: rgba(90, 70, 30, 0.08);
    --stain2: rgba(60, 40, 20, 0.06);
    --font-header: 'Oswald', Impact, sans-serif;
    --font-typed: 'Courier Prime', 'Courier New', monospace;
    --font-scrawl: 'Special Elite', serif;
    --font-display: 'Oswald', Impact, sans-serif;
    --font-body: 'Courier Prime', 'Courier New', monospace;
    --font-mono: 'Courier Prime', 'Courier New', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--paper);
    font-family: var(--font-typed);
    font-size: 12.5px;
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 9999;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='5' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    opacity: 0.09;
  }
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 9998;
    background:
      radial-gradient(ellipse at 20% 50%, var(--stain1) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 30%, var(--stain2) 0%, transparent 40%),
      radial-gradient(ellipse at 50% 90%, var(--stain1) 0%, transparent 45%);
  }

  /* ─── Header ─── */
  .header {
    padding: 1.5rem 2rem 1rem;
    border-bottom: 3px solid var(--border);
    position: relative;
  }
  .header::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: repeating-linear-gradient(
      90deg,
      var(--cardboard-dark) 0px, var(--cardboard-dark) 4px,
      var(--border) 4px, var(--border) 7px,
      var(--cardboard-dark) 7px, var(--cardboard-dark) 9px,
      transparent 9px, transparent 14px
    );
    opacity: 0.7;
  }
  .header h1 {
    font-family: var(--font-header);
    font-size: 3rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--cardboard-light);
    line-height: 0.9;
    filter: url(#distress);
  }
  .header h1 span {
    font-family: var(--font-typed);
    font-size: 0.23em;
    color: var(--paper-dim);
    letter-spacing: 0.02em;
    display: block;
    margin-top: 0.4rem;
    text-transform: none;
    filter: none;
    font-weight: 400;
  }
  .header-row {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 1rem;
    flex-wrap: wrap;
  }
  .auth-status {
    display: flex;
    gap: 0.5rem;
    align-items: center;
    flex-wrap: wrap;
  }
  .badge {
    font-family: var(--font-typed);
    font-size: 0.65rem;
    font-weight: 400;
    padding: 0.2rem 0.45rem;
    border-radius: 1px;
    letter-spacing: 0.02em;
    border: 1px solid transparent;
  }
  .badge-ok { background: var(--green-dim); color: #b8d4a8; border-color: #3a5a2a; }
  .badge-off { background: var(--border); color: var(--paper-dim); }
  .badge-spotify { background: #15823b; color: #b8f0ce; border-color: #0d6a2f; }

  /* ─── Layout ─── */
  .app {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 1.5rem 4rem;
  }

  /* ─── Setup Panel ─── */
  .setup-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 1.5rem;
    margin: 1.5rem 0;
  }
  .setup-panel h2 {
    font-family: var(--font-header);
    font-size: 1rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--cardboard-light);
    margin-bottom: 1rem;
  }
  .setup-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 1rem;
  }
  .setup-group label {
    font-family: var(--font-typed);
    font-size: 0.6rem;
    color: var(--paper-dim);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    display: block;
    margin-bottom: 0.4rem;
  }
  .setup-group input {
    width: 100%;
    background: var(--ink);
    border: 1px solid var(--border);
    color: var(--paper);
    font-family: var(--font-typed);
    font-size: 0.75rem;
    padding: 0.5rem 0.6rem;
    border-radius: 1px;
    outline: none;
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.3);
  }
  .setup-group input:focus { border-color: var(--cardboard-dark); }
  .setup-group input::placeholder { color: var(--border-light); }
  .setup-group .hint {
    font-size: 0.65rem;
    color: var(--paper-dim);
    margin-top: 0.3rem;
    opacity: 0.7;
  }
  .setup-actions {
    margin-top: 1rem;
    display: flex;
    gap: 0.75rem;
    flex-wrap: wrap;
  }

  /* ─── Buttons ─── */
  .btn {
    font-family: var(--font-header);
    font-size: 0.85rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 0.5rem 1rem;
    border: 2px solid var(--cardboard-dark);
    border-radius: 1px;
    background: var(--cardboard-dark);
    color: var(--ink);
    cursor: pointer;
    transition: all 0.1s;
    box-shadow: 2px 2px 0px rgba(0,0,0,0.3);
    white-space: nowrap;
  }
  .btn:hover { background: var(--cardboard); border-color: var(--cardboard); }
  .btn:active { box-shadow: none; transform: translate(1px, 1px); }
  .btn:disabled { opacity: 0.35; cursor: default; }
  .btn:disabled:hover { background: var(--cardboard-dark); border-color: var(--cardboard-dark); }
  .btn-primary {
    background: var(--cardboard-dark);
    border-color: var(--cardboard);
    color: var(--ink);
  }
  .btn-primary:hover { background: var(--cardboard); }
  .btn-spotify {
    background: #15823b;
    border-color: #0d6a2f;
    color: #fff;
  }
  .btn-spotify:hover { background: var(--spotify-green); border-color: var(--spotify-green); }
  .btn-sm { font-size: 0.7rem; padding: 0.3rem 0.6rem; box-shadow: 1px 1px 0 rgba(0,0,0,0.3); }
  .btn-danger { background: transparent; border-color: var(--red); color: var(--red); box-shadow: none; }
  .btn-danger:hover { background: var(--red); color: var(--ink); }

  /* ─── Search Form ─── */
  .search-section { margin-top: 1.2rem; }
  .search-section h2 {
    font-family: var(--font-header);
    font-size: 1rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--paper-dim);
    margin-bottom: 0.6rem;
  }
  .search-form {
    display: grid;
    grid-template-columns: 70px 1fr 130px 140px 90px;
    gap: 0.5rem;
    align-items: end;
  }
  .search-form-advanced {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr 1fr 90px 90px;
    gap: 0.5rem;
    align-items: end;
    margin-top: 0.5rem;
    animation: fadeIn 0.15s ease-out;
  }
  @media (max-width: 900px) {
    .search-form { grid-template-columns: 1fr 1fr 1fr; }
    .search-form-advanced { grid-template-columns: 1fr 1fr 1fr; }
  }
  @media (max-width: 580px) {
    .search-form { grid-template-columns: 1fr 1fr; }
    .search-form-advanced { grid-template-columns: 1fr 1fr; }
  }
  .advanced-toggle {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    margin-top: 0.5rem;
  }
  .advanced-toggle-btn {
    background: none;
    border: none;
    color: var(--paper-dim);
    font-family: var(--font-typed);
    font-size: 0.65rem;
    cursor: pointer;
    text-decoration: underline;
    text-underline-offset: 2px;
    text-decoration-style: dashed;
    text-decoration-color: var(--border-light);
    padding: 0;
    transition: color 0.1s;
  }
  .advanced-toggle-btn:hover { color: var(--paper); text-decoration-color: var(--cardboard-dark); }
  .advanced-count {
    font-family: var(--font-typed);
    font-size: 0.55rem;
    background: var(--cardboard-dark);
    color: var(--ink);
    padding: 0.08rem 0.3rem;
    border-radius: 1px;
  }
  .field label {
    font-family: var(--font-typed);
    font-size: 0.6rem;
    color: var(--paper-dim);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    display: block;
    margin-bottom: 0.25rem;
  }
  .field input, .field select {
    width: 100%;
    background: var(--ink);
    border: 1px solid var(--border);
    color: var(--paper);
    font-family: var(--font-typed);
    font-size: 0.75rem;
    padding: 0.5rem 0.6rem;
    border-radius: 1px;
    outline: none;
    transition: border-color 0.2s;
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.3);
  }
  .field input:focus, .field select:focus { border-color: var(--cardboard-dark); }
  .field select { cursor: pointer; }
  .field select option { background: var(--surface); }
  .field input::placeholder { color: var(--border-light); }

  /* ─── Tabs ─── */
  .tabs {
    display: flex;
    gap: 0;
    margin-top: 1.2rem;
    border-bottom: 2px solid var(--border);
  }
  .tab {
    font-family: var(--font-typed);
    font-size: 0.7rem;
    font-weight: 400;
    padding: 0.5rem 1rem;
    background: none;
    border: none;
    color: var(--paper-dim);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.1s;
    margin-bottom: -2px;
    letter-spacing: 0.03em;
  }
  .tab:hover { color: var(--paper); }
  .tab.active {
    color: var(--cardboard-light);
    border-bottom-color: var(--cardboard-dark);
    background: rgba(168, 137, 74, 0.05);
  }
  .tab .count {
    background: var(--border);
    color: var(--paper-dim);
    font-size: 0.58rem;
    padding: 0.08rem 0.35rem;
    border-radius: 1px;
    margin-left: 0.3rem;
  }
  .tab.active .count { background: var(--cardboard-dark); color: var(--ink); }

  /* ─── Results ─── */
  .results { margin-top: 0.5rem; }
  .results-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.5rem;
  }
  .results-count {
    font-family: var(--font-typed);
    font-size: 0.65rem;
    color: var(--paper-dim);
  }
  .release-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 0.7rem 0.8rem;
    margin-bottom: 3px;
    display: grid;
    grid-template-columns: 28px 48px 1fr auto;
    gap: 0.6rem;
    align-items: center;
    transition: background 0.1s;
    cursor: pointer;
    position: relative;
  }
  .release-card:nth-child(even) { background: var(--surface2); }
  .release-card:hover { background: #342e22; }
  .release-card.selected {
    background: #2e2818;
    border-color: var(--cardboard-dark);
    border-left: 3px solid var(--cardboard);
  }
  .release-check {
    width: 18px;
    height: 18px;
    border: 1.5px solid var(--border-light);
    border-radius: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .release-card.selected .release-check {
    border-color: var(--cardboard);
    background: var(--cardboard);
  }
  .release-check svg { opacity: 0; transition: opacity 0.15s; }
  .release-card.selected .release-check svg { opacity: 1; }
  .release-thumb {
    width: 48px;
    height: 48px;
    border-radius: 1px;
    background: var(--border);
    object-fit: cover;
    flex-shrink: 0;
    filter: saturate(0.7) contrast(1.1) brightness(0.95);
    border: 1px solid rgba(0,0,0,0.3);
  }
  .release-info h3 {
    font-family: var(--font-typed);
    font-size: 0.82rem;
    font-weight: 400;
    color: var(--paper);
    line-height: 1.25;
  }
  .release-meta {
    font-family: var(--font-typed);
    font-size: 0.6rem;
    color: var(--paper-dim);
    margin-top: 0.15rem;
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .release-meta span { opacity: 0.8; }
  .release-actions {
    display: flex;
    gap: 0.25rem;
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  .match-badge {
    font-family: var(--font-typed);
    font-size: 0.58rem;
    padding: 0.15rem 0.35rem;
    border-radius: 1px;
    white-space: nowrap;
  }
  .match-spotify { background: #15823b; color: #b8f0ce; }
  .match-youtube { background: #661122; color: #ffaaaa; }
  .match-none { background: var(--border); color: var(--paper-dim); }

  /* ─── Service links ─── */
  .spotify-link, .yt-link, .apple-link, .ytmusic-link, .bandcamp-link, .discogs-link {
    font-family: var(--font-typed);
    font-size: 0.58rem;
    text-decoration: none;
    padding: 0.15rem 0.35rem;
    border: 1px solid var(--border);
    border-radius: 1px;
    transition: all 0.1s;
    white-space: nowrap;
  }
  .spotify-link { color: #4a9a5a; border-color: #2a4a2a; }
  .spotify-link:hover { background: #15823b; color: #fff; border-color: #15823b; }
  .apple-link { color: #c06068; border-color: #4a2028; }
  .apple-link:hover { background: #882838; color: #fff; border-color: #882838; }
  .ytmusic-link { color: #aa5555; border-color: #4a2222; }
  .ytmusic-link:hover { background: #882222; color: #fff; border-color: #882222; }
  .yt-link { color: #aa5555; border-color: #4a2222; }
  .yt-link:hover { background: #882222; color: #fff; border-color: #882222; }
  .bandcamp-link { color: #629aa9; border-color: #2a3a4a; }
  .bandcamp-link:hover { background: #1da0c3; color: #fff; border-color: #1da0c3; }
  .discogs-link { color: var(--cardboard-dark); border-color: var(--border); }
  .discogs-link:hover { background: var(--cardboard-dark); color: var(--ink); border-color: var(--cardboard-dark); }

  /* ─── Pagination ─── */
  .pagination {
    display: flex;
    justify-content: center;
    gap: 0.5rem;
    margin-top: 0.8rem;
    padding-top: 0.8rem;
    border-top: 1px solid var(--border);
  }
  .page-info {
    font-family: var(--font-typed);
    font-size: 0.65rem;
    color: var(--paper-dim);
    display: flex;
    align-items: center;
  }

  /* ─── Playlist Builder ─── */
  .playlist-builder {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 1.5rem;
    margin-top: 1rem;
  }
  .playlist-builder h3 {
    font-family: var(--font-header);
    font-size: 1rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--cardboard-light);
    margin-bottom: 1rem;
  }
  .playlist-input-row {
    display: flex;
    gap: 0.6rem;
    margin-bottom: 1rem;
  }
  .playlist-input-row input {
    flex: 1;
    background: var(--ink);
    border: 1px solid var(--border);
    color: var(--paper);
    font-family: var(--font-typed);
    font-size: 0.75rem;
    padding: 0.5rem 0.6rem;
    border-radius: 1px;
    outline: none;
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.3);
  }
  .playlist-input-row input:focus { border-color: var(--cardboard-dark); }
  .unmatched-section { margin-top: 1.5rem; }
  .unmatched-section h4 {
    font-family: var(--font-typed);
    font-size: 0.7rem;
    color: var(--paper-dim);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 0.6rem;
  }
  .unmatched-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.5rem 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.78rem;
  }

  /* ─── Loading ─── */
  .spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid var(--border);
    border-top-color: var(--cardboard);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    margin-right: 0.5rem;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-bar {
    height: 3px;
    background: var(--border);
    border-radius: 1px;
    overflow: hidden;
    margin: 1rem 0;
  }
  .loading-bar-fill {
    height: 100%;
    background: var(--cardboard);
    border-radius: 1px;
    transition: width 0.3s;
  }

  /* ─── Empty states ─── */
  .empty {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--paper-dim);
    font-family: var(--font-scrawl);
    font-size: 0.85rem;
  }
  .empty-icon { font-size: 2rem; margin-bottom: 0.5rem; display: block; }

  /* ─── Success panel ─── */
  .success-panel {
    background: #14291c;
    border: 1px solid var(--green-dim);
    border-radius: 2px;
    padding: 1.25rem;
    margin-top: 1rem;
    text-align: center;
  }
  .success-panel a {
    color: var(--spotify-green);
    font-family: var(--font-typed);
    font-size: 0.8rem;
  }

  /* ─── Error ─── */
  .error-msg {
    background: #2a1515;
    border: 1px solid #5a2a2a;
    color: #e8a0a0;
    font-family: var(--font-typed);
    font-size: 0.7rem;
    padding: 0.5rem 0.8rem;
    border-radius: 1px;
    margin-top: 0.5rem;
  }

  /* ─── Select all bar ─── */
  .select-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.5rem 0;
    margin-bottom: 0.3rem;
  }

  /* ─── Animations ─── */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .fade-in { animation: fadeIn 0.2s ease-out forwards; }

  /* ─── Toggle ─── */
  .toggle-link {
    background: none;
    border: none;
    color: var(--paper-dim);
    font-family: var(--font-typed);
    font-size: 0.65rem;
    cursor: pointer;
    text-decoration: underline;
    text-underline-offset: 2px;
    text-decoration-color: var(--border-light);
  }
  .toggle-link:hover { color: var(--paper); }


  /* ─── Clickable metadata ─── */
  .meta-click {
    cursor: pointer;
    text-decoration: underline;
    text-decoration-style: dashed;
    text-underline-offset: 2px;
    text-decoration-color: var(--border-light);
    transition: color 0.1s;
  }
  .meta-click:hover {
    color: var(--cardboard-light);
    text-decoration-color: var(--cardboard-dark);
  }

  /* ─── Filter banner ─── */
  .filter-banner {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    flex-wrap: wrap;
    padding: 0.6rem 0.8rem;
    margin-top: 0.6rem;
    margin-bottom: 0.4rem;
    background: var(--surface2);
    border: 1px solid var(--cardboard-dark);
    border-left: 3px solid var(--cardboard);
    border-radius: 1px;
    font-family: var(--font-typed);
    font-size: 0.68rem;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .filter-banner-label {
    color: var(--paper-dim);
    margin-right: 0.2rem;
  }
  .filter-chip {
    display: inline-flex;
    align-items: center;
    gap: 0.25rem;
    background: var(--cardboard-dark);
    color: var(--ink);
    font-family: var(--font-typed);
    font-size: 0.6rem;
    padding: 0.15rem 0.4rem;
    border-radius: 1px;
    white-space: nowrap;
  }
  .filter-chip-x {
    cursor: pointer;
    opacity: 0.7;
    font-size: 0.75rem;
    line-height: 1;
    transition: opacity 0.1s;
  }
  .filter-chip-x:hover { opacity: 1; }
  .filter-clear {
    margin-left: auto;
    color: var(--red);
    cursor: pointer;

// Parse "Artist - Title" from Discogs title
function parseTitle(t) {
  if (!t) return { artist: "", title: t || "" };
  const idx = t.indexOf(" - ");
  if (idx === -1) return { artist: "", title: t };
  let artist = t.slice(0, idx).trim();
  // Strip Discogs disambiguation numbers like (2), (3), etc.
  artist = artist.replace(/\s*\(\d+\)\s*$/, "");
  return { artist, title: t.slice(idx + 3).trim() };
}

// --- Search query helpers ---
// isSelfTitled: "Wormwood - Wormwood" → true
function isSelfTitled(artist, title) {
  if (!artist || !title) return false;
  return artist.trim().toLowerCase() === title.trim().toLowerCase();
}

// Formats that are generic enough to add noise rather than signal
const GENERIC_FORMATS = new Set([
  "vinyl", "lp", "album", "compilation", "reissue", "remastered",
  "stereo", "mono", "limited edition", "deluxe edition", "gatefold",
  "cd", "digital", "file", "mp3", "flac", "wav", "aac"
]);

// Extract a search-useful format hint from the Discogs format array
// Returns e.g. '7"', '10"', 'cassette', 'EP', 'flexi-disc', or null
function getDistinctiveFormat(formatArr) {
  if (!formatArr || !formatArr.length) return null;
  for (const f of formatArr) {
    const lower = f.trim().toLowerCase();
    if (GENERIC_FORMATS.has(lower)) continue;
    // These are the formats that actually help disambiguate in search
    if (/^7"/.test(f) || /^10"/.test(f) || /^12"/.test(f)) return f.trim();
    if (lower === "cassette") return "cassette";
    if (lower === "ep") return "EP";
    if (lower === "single") return "single";
    if (lower === "mini-album" || lower === "minialbum") return "mini-album";
    if (lower === "flexi-disc") return "flexi-disc";
    if (lower === "shellac") return "shellac";
    if (lower === "78 rpm") return "78 rpm";
    if (lower === "8-track cartridge") return "8-track";
    if (lower === "reel-to-reel") return "reel-to-reel";
    if (lower === "minidisc") return "minidisc";
    if (lower === "laserdisc") return "laserdisc";
    if (lower === "vhs") return "VHS";
    if (lower === "betamax") return "betamax";
  }
  return null;
}

// Build a base search string with year + self-titled hint + distinctive format
function buildSearchQuery(artist, title, year, format) {
  let parts = [artist, title].filter(Boolean);
  if (year) parts.push(String(year));
  if (isSelfTitled(artist, title)) parts.push("album");
  const fmt = getDistinctiveFormat(format);
  if (fmt) parts.push(fmt);
  return parts.join(" ").trim();
}

// YouTube gets "full album" appended — matches how obscure albums are typically uploaded
function buildYtAlbumQuery(artist, title, year, format) {
  let parts = [artist, title].filter(Boolean);
  if (year) parts.push(String(year));
  parts.push("full album");
  const fmt = getDistinctiveFormat(format);
  if (fmt) parts.push(fmt);
  return parts.join(" ").trim();
}

// Track-level: artist + track title + year (no "album" or format hint)
function buildTrackQuery(artist, trackTitle, year) {
  let parts = [artist, trackTitle].filter(Boolean);
  if (year) parts.push(String(year));
  return parts.join(" ").trim();
}

function ytSearchUrl(artist, title, year, format) {
  const q = encodeURIComponent(buildYtAlbumQuery(artist, title, year, format));
  return `https://www.youtube.com/results?search_query=${q}`;
}

function ytTrackSearchUrl(artist, trackTitle, year) {
  const q = encodeURIComponent(buildTrackQuery(artist, trackTitle, year));

}

function spotifySearchUrl(artist, title, year, format) {

}

function openSpotifySearch(artist, title, year, format, e) {
  if (e) e.preventDefault();
  const q = encodeURIComponent(buildSearchQuery(artist, title, year, format));
  const appUri = `spotify:search:${q}`;
  const webUrl = `https://open.spotify.com/search/${q}`;
  const start = Date.now();
  let didBlur = false;
  const onBlur = () => { didBlur = true; };
  window.addEventListener("blur", onBlur);
  window.location.href = appUri;
  setTimeout(() => {
    window.removeEventListener("blur", onBlur);
    if (!didBlur && Date.now() - start < 2000) {
      window.open(webUrl, "_blank");
    }
  }, 800);
}

  // ─── PKCE Helpers ───
  function generateCodeVerifier(len) {
    const arr = new Uint8Array(len || 64);
    crypto.getRandomValues(arr);
    const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~";
    return Array.from(arr, function(b) { return chars[b % chars.length]; }).join("");
  }
  async function pkceChallenge(verifier) {
    const data = new TextEncoder().encode(verifier);
    const digest = await crypto.subtle.digest("SHA-256", data);
    return btoa(String.fromCharCode.apply(null, new Uint8Array(digest)))
      .replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
  }

      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: new URLSearchParams({
        client_id: SPOTIFY_CLIENT_ID,
        grant_type: "authorization_code",
        code: code,
        redirect_uri: REDIRECT_URI,
        code_verifier: verifier,
      }),
    })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.access_token) {

          sessionStorage.removeItem("spotify_code_verifier");

  // ─── Resolve credit field text to a Discogs artist entity ───

    if (!credit.trim()) return;
    setDisambigResolving(true);

    try {
      // Search Discogs for artist entities matching the credit text
      const url = new URL(DISCOGS_API);
      url.searchParams.set("type", "artist");
      url.searchParams.set("q", credit.trim());
      url.searchParams.set("per_page", "10");
      const res = await fetch(url.toString());
      if (!res.ok) throw new Error("Discogs artist search failed");
      const data = await res.json();
      const artists = (data.results || []).filter(a => a.type === "artist");

      if (artists.length === 0) {
        // No artist entity found — fall through to fuzzy credit search
        setDisambigResolving(false);
        setArtistIdSearch(null);
        searchDiscogs(1);
        return;
      }

      if (artists.length === 1) {

        setFilterTrigger(f => f + 1);
        return;

      // Check if the top result's name is an exact match (case-insensitive)
      const exactMatch = artists.find(a => {
        const cleanName = (a.title || "").replace(/\s*\(\d+\)\s*$/, "").toLowerCase();

        setArtistIdSearch({ id: exactMatch.id, name: clean });
        setDisambigResolving(false);
        setFilterTrigger(f => f + 1);
        return;
      }

      // Multiple candidates — show disambiguation picker

  const fetchMbCredits = async (cardId, artistName, albumTitle, releaseYear) => {
    if (mbCreditsCache[cardId] !== undefined) return; // already fetched or in progress
    setMbCreditsCache(prev => ({ ...prev, [cardId]: "loading" }));

    try {
      // Search MusicBrainz for the release by artist + title
      const cleanArtist = (artistName || "").replace(/\s*\(\d+\)\s*$/, "");
      let query = "";
      if (cleanArtist && albumTitle) {
        query = `artist:"${cleanArtist}" AND release:"${albumTitle}"`;
      } else {
        query = `release:"${albumTitle || cleanArtist}"`;
      }

      const searchUrl = `${MUSICBRAINZ_API}/release/?query=${encodeURIComponent(query)}&fmt=json&limit=3`;
      const searchRes = await fetch(searchUrl, {
        headers: { "User-Agent": "CrateDigger/1.0 (https://willohara.github.io/crate-digger/)" }
      });

      if (!searchRes.ok) {
        setMbCreditsCache(prev => ({ ...prev, [cardId]: null }));
        return;
      }

      const searchData = await searchRes.json();
      const releases = searchData.releases || [];
      if (releases.length === 0) {
        setMbCreditsCache(prev => ({ ...prev, [cardId]: null }));
        return;
      }

      // Pick the best match (first result, or year-matched)
      let bestRelease = releases[0];
      if (releaseYear) {
        const yearMatch = releases.find(r => r.date && r.date.startsWith(String(releaseYear)));

      // Rate limit: wait 1s between MusicBrainz requests

      // Fetch release details with artist-rels and recording-level rels
      const detailUrl = `${MUSICBRAINZ_API}/release/${bestRelease.id}?inc=artist-credits+recording-level-rels+artist-rels&fmt=json`;
      const detailRes = await fetch(detailUrl, {
        headers: { "User-Agent": "CrateDigger/1.0 (https://willohara.github.io/crate-digger/)" }
      });

      if (!detailRes.ok) {
        setMbCreditsCache(prev => ({ ...prev, [cardId]: null }));
        return;
      }

      const detailData = await detailRes.json();

      // Extract credits from release-level relations
      const credits = [];
      const seenCredits = new Set();

      const addCredit = (name, role) => {
        const key = `${name}|||${role}`;
        if (seenCredits.has(key)) return;
        seenCredits.add(key);
        credits.push({ name, role });
      };

      // Release-level artist relations
      if (detailData.relations) {
        for (const rel of detailData.relations) {
          if (rel.type && rel.artist) {
            const roleName = rel.type.replace(/_/g, " ").replace(/\b\w/g, c => c.toUpperCase());
            const attributes = (rel.attributes || []).join(", ");
            const fullRole = attributes ? `${roleName} (${attributes})` : roleName;
            addCredit(rel.artist.name, fullRole);
          }
        }
      }

      // Recording-level relations (from media → tracks → recording → relations)
      if (detailData.media) {
        for (const medium of detailData.media) {
          for (const track of (medium.tracks || [])) {
            if (track.recording && track.recording.relations) {
              for (const rel of track.recording.relations) {
                if (rel.type && rel.artist) {
                  const roleName = rel.type.replace(/_/g, " ").replace(/\b\w/g, c => c.toUpperCase());
                  const attributes = (rel.attributes || []).join(", ");
                  const fullRole = attributes ? `${roleName} (${attributes})` : roleName;
                  addCredit(rel.artist.name, fullRole);
                }
              }
            }
          }
        }
      }

      setMbCreditsCache(prev => ({ ...prev, [cardId]: credits.length > 0 ? credits : null }));
    } catch (e) {
      setMbCreditsCache(prev => ({ ...prev, [cardId]: null }));
    }

      const searchDiscogs = async (p = 1) => {
    setLoading(true);

    setError("");
    setPage(p);
    try {
      // ─── Artist ID search: use /artists/{id}/releases endpoint ───
      if (artistIdSearch) {
        const url = new URL(`${DISCOGS_API}/artists/${artistIdSearch.id}/releases`);
        url.searchParams.set("per_page", "20");
        url.searchParams.set("page", String(p));
        if (sortBy) {
          url.searchParams.set("sort", sortBy);
          url.searchParams.set("sort_order", sortOrder);
        }

        const res = await fetch(url.toString());
        if (!res.ok) {
          const txt = await res.text();
          throw new Error(`Discogs API error (${res.status}): ${txt.slice(0, 200)}`);
        }
        const data = await res.json();
        let releases = data.releases || [];

        // Normalize to match the shape searchDiscogs results expect
        // Artist releases endpoint returns {id, title, year, thumb, role, type, ...}
        // We need to make these look like search results
        releases = releases.map(r => ({
          id: r.id,
          master_id: r.type === 'master' ? r.id : (r.master_id || null),
          title: r.artist ? `${r.artist} - ${r.title}` : r.title,
          year: r.year || "",
          thumb: r.thumb || "",
          country: r.country || "",
          format: r.format ? (Array.isArray(r.format) ? r.format : [r.format]) : [],
          uri: r.resource_url ? r.resource_url.replace('https://api.discogs.com', 'https://www.discogs.com') : "",
          _artistRole: r.role || "",
          type: r.type || "release",
        }));

        // Deduplicate by master_id (keep first occurrence)
        const seen = new Set();
        releases = releases.filter(r => {
          if (r.master_id) {
            if (seen.has(r.master_id)) return false;
            seen.add(r.master_id);
          }
          return true;
        });

        setResults(releases);
        setPagination(data.pagination || null);
        setLoading(false);
        return;
      }

      // ─── Standard search path ───
      // Determine search type based on whether credit is used
      const useCredit = !!credit;

      // Primary search: masters (or releases if credit search)
      const url = new URL(DISCOGS_API);
      url.searchParams.set("type", useCredit ? "release" : "master");
      url.searchParams.set("per_page", "20");
      url.searchParams.set("page", String(p));
      if (year) url.searchParams.set("year", year);
      if (genre) url.searchParams.set("genre", genre);
      if (style) url.searchParams.set("style", style);
      if (artistSearch) url.searchParams.set("artist", artistSearch);
      if (releaseTitle) url.searchParams.set("release_title", releaseTitle);
      if (catno) url.searchParams.set("catno", catno);
      if (query) url.searchParams.set("q", query);
      if (country) url.searchParams.set("country", country);
      if (label) url.searchParams.set("label", label);
      if (credit) url.searchParams.set("credit", credit);
      if (track) url.searchParams.set("track", track);
      if (sortBy) {
        url.searchParams.set("sort", sortBy);
        url.searchParams.set("sort_order", sortOrder);
      }

      const res = await fetch(url.toString());
      if (!res.ok) {
        const txt = await res.text();
        throw new Error(`Discogs API error (${res.status}): ${txt.slice(0, 200)}`);
      }
      const data = await res.json();
      let mainResults = data.results || [];

      // If credit search returned 0 results, try as artist name search instead
      if (useCredit && mainResults.length === 0) {
        const fallbackUrl = new URL(DISCOGS_API);
        fallbackUrl.searchParams.set("type", "master");
        fallbackUrl.searchParams.set("per_page", "20");
        fallbackUrl.searchParams.set("page", String(p));
        fallbackUrl.searchParams.set("artist", credit);
        if (year) fallbackUrl.searchParams.set("year", year);
        if (genre) fallbackUrl.searchParams.set("genre", genre);
        if (style) fallbackUrl.searchParams.set("style", style);
        if (country) fallbackUrl.searchParams.set("country", country);
        if (label) fallbackUrl.searchParams.set("label", label);
        if (releaseTitle) fallbackUrl.searchParams.set("release_title", releaseTitle);
        if (catno) fallbackUrl.searchParams.set("catno", catno);
        if (sortBy) {
          fallbackUrl.searchParams.set("sort", sortBy);
          fallbackUrl.searchParams.set("sort_order", sortOrder);
        }
        const fallbackRes = await fetch(fallbackUrl.toString());
        if (fallbackRes.ok) {
          const fallbackData = await fallbackRes.json();
          mainResults = fallbackData.results || [];
          if (mainResults.length > 0) {
            setPagination(fallbackData.pagination || null);
          }
        }
      }

      // If credit search returned releases, deduplicate by master_id
      if (useCredit && mainResults.length > 0) {
        const seen = new Set();
        mainResults = mainResults.filter(r => {

      }

      // If includeOrphans is on AND we're NOT doing a credit search AND on page 1,
      // do a secondary search for releases without masters
      let orphanResults = [];
      if (includeOrphans && !useCredit && p === 1) {
        try {
          const oUrl = new URL(DISCOGS_API);
          oUrl.searchParams.set("type", "release");
          oUrl.searchParams.set("per_page", "10");
          oUrl.searchParams.set("page", "1");
          if (year) oUrl.searchParams.set("year", year);
          if (genre) oUrl.searchParams.set("genre", genre);
          if (style) oUrl.searchParams.set("style", style);
          if (artistSearch) oUrl.searchParams.set("artist", artistSearch);
          if (releaseTitle) oUrl.searchParams.set("release_title", releaseTitle);
          if (catno) oUrl.searchParams.set("catno", catno);
          if (query) oUrl.searchParams.set("q", query);
          if (country) oUrl.searchParams.set("country", country);
          if (label) oUrl.searchParams.set("label", label);
          if (sortBy) {
            oUrl.searchParams.set("sort", sortBy);
            oUrl.searchParams.set("sort_order", sortOrder);
          }
          const oRes = await fetch(oUrl.toString());
          if (oRes.ok) {
            const oData = await oRes.json();
            const oReleases = oData.results || [];
            // Keep only releases that have NO master_id (orphans)
            orphanResults = oReleases.filter(r => !r.master_id);
          }
        } catch (e) { /* silently fail orphan search */ }
      }

      // Merge: main results first, then orphans (marked)
      const finalResults = [...mainResults];
      if (orphanResults.length > 0) {
        orphanResults.forEach(r => { r._orphan = true; });
        finalResults.push(...orphanResults);
      }

      setResults(finalResults);
      setPagination(data.pagination || null);
    } catch (e) {
      setError(e.message);
      setResults([]);
    } finally {
      setLoading(false);
    }
  };

  // ─── Toggle selection ───
  const toggleSelect = (release) => {
    setSelected(prev => {
      const next = { ...prev };
      if (next[release.id]) {
        delete next[release.id];
      } else {
        next[release.id] = release;
      }
      return next;
    });
  };

  const selectAllOnPage = () => {
    setSelected(prev => {
      const next = { ...prev };
      results.forEach(r => { next[r.id] = r; });
      return next;
    });
  };

  const deselectAllOnPage = () => {
    setSelected(prev => {
      const next = { ...prev };
      results.forEach(r => { delete next[r.id]; });
      return next;

  const clearSelected = () => { setSelected({}); setSpotifyMatches({}); };

  // ─── Match selected to Spotify ───
  const matchToSpotify = async () => {
    if (!spotifyToken) { alert("Connect Spotify first"); return; }
    const entries = Object.entries(selected);
    if (entries.length === 0) return;

    setMatching(true);
    setMatchProgress({ done: 0, total: entries.length });
    const newMatches = { ...spotifyMatches };

    for (let i = 0; i < entries.length; i++) {
      const [id, release] = entries[i];
      if (newMatches[id] !== undefined) {
        setMatchProgress({ done: i + 1, total: entries.length });
        continue; // already matched
      }

      const { artist, title } = parseTitle(release.title);
      const releaseYear = release.year ? String(release.year) : "";
      let q = "";
      if (artist && title) {
        q = `artist:${artist} album:${title}`;
      } else {
        q = release.title;
      }
      if (releaseYear) q += ` year:${releaseYear}`;

      try {
        const url = `${SPOTIFY_API}/search?type=album&limit=5&q=${encodeURIComponent(q)}`;
        const res = await fetch(url, { headers: { Authorization: `Bearer ${spotifyToken}` } });
        if (res.status === 401) {
          setSpotifyToken(null);
          setSpotifyUser(null);
          setError("Spotify session expired. Please reconnect Spotify and try again.");
          break;
        }
        if (res.status === 429) {
          const wait = parseInt(res.headers.get("Retry-After") || "2") * 1000;
          await delay(wait);
          i--; continue;
        }
        if (!res.ok) throw new Error("Spotify search failed");
        const data = await res.json();
        let albums = data.albums?.items || [];

        // If no results with year, try without
        if (albums.length === 0 && releaseYear) {
          const q2 = artist && title ? `artist:${artist} album:${title}` : release.title;
          const url2 = `${SPOTIFY_API}/search?type=album&limit=5&q=${encodeURIComponent(q2)}`;
          const res2 = await fetch(url2, { headers: { Authorization: `Bearer ${spotifyToken}` } });
          if (res2.ok) {
            const data2 = await res2.json();
            albums = data2.albums?.items || [];
          }
          await delay(80);
        }

        if (albums.length > 0) {
          const best = albums[0];
          newMatches[id] = {
            uri: best.uri,
            name: best.name,
            artist: best.artists?.map(a => a.name).join(", ") || "",
            url: best.external_urls?.spotify || "",
            albumId: best.id
          };
        } else {
          newMatches[id] = null;
        }
      } catch (e) {
        newMatches[id] = null;
      }

      setMatchProgress({ done: i + 1, total: entries.length });
      setSpotifyMatches({ ...newMatches });
      await delay(120); // rate limit courtesy
    }

    setSpotifyMatches(newMatches);
    setMatching(false);
  };

  // ─── Create Spotify Playlist ───
  const createPlaylist = async () => {
    if (!spotifyToken || !spotifyUser) { alert("Connect Spotify first"); return; }
    const matched = Object.entries(spotifyMatches).filter(([_, v]) => v !== null);
    if (matched.length === 0) { alert("No Spotify matches found"); return; }

    setCreating(true);
    setPlaylistResult(null);

    try {
      // 1) Create playlist
      const name = playlistName || `Crate Digger – ${year || "Mixed"}`;
      const plRes = await fetch(`${SPOTIFY_API}/me/playlists`, {
        method: "POST",
        headers: {
          Authorization: `Bearer ${spotifyToken}`,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ name, description: `Dug from Discogs via Crate Digger`, public: false })
      });
      if (!plRes.ok) {
        const errBody = await plRes.text();
        if (plRes.status === 401) {
          setSpotifyToken(null);
          setSpotifyUser(null);
          throw new Error("Spotify session expired. Please reconnect Spotify and try again.");
        }
        throw new Error("Failed to create playlist (" + plRes.status + "): " + errBody.slice(0, 200));
      }
      const playlist = await plRes.json();

      // 2) Get track URIs from each album (first track or all tracks)
      const trackUris = [];
      for (const [id, match] of matched) {
        try {
          const tRes = await fetch(`${SPOTIFY_API}/albums/${match.albumId}/tracks?limit=50`, {
            headers: { Authorization: `Bearer ${spotifyToken}` }
          });
          if (tRes.ok) {
            const tData = await tRes.json();
            const uris = (tData.items || []).map(t => t.uri);
            trackUris.push(...uris);
          }
          await delay(80);
        } catch (e) { /* skip */ }
      }

      // 3) Add tracks in batches of 100
      for (let i = 0; i < trackUris.length; i += 100) {
        const batch = trackUris.slice(i, i + 100);
        await fetch(`${SPOTIFY_API}/playlists/${playlist.id}/items`, {
          method: "POST",
          headers: {
            Authorization: `Bearer ${spotifyToken}`,
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ uris: batch })
        });
        await delay(100);
      }

      setPlaylistResult({
        url: playlist.external_urls?.spotify,
        name: playlist.name,
        trackCount: trackUris.length
      });
    } catch (e) {
      setError(e.message);
    } finally {
      setCreating(false);
    }
  };

  // ─── Derived data ───
  const selectedList = Object.entries(selected);
  const matchedCount = Object.values(spotifyMatches).filter(v => v !== null).length;
  const unmatchedEntries = selectedList.filter(([id]) => spotifyMatches[id] === null);

  return (

              <span className="badge badge-spotify">SPOTIFY: {spotifyUser.display_name}</span>

              <span className="badge badge-spotify">SPOTIFY ✓</span>
            ) : (
              <button className="btn btn-sm btn-spotify" onClick={loginSpotify} style={{fontSize:'0.65rem',padding:'0.2rem 0.5rem'}}>Connect Spotify</button>
            )}
            <button className="toggle-link" onClick={() => setShowSetup(!showSetup)}>
              {showSetup ? "hide setup" : "setup"}
            </button>
          </div>
        </div>
      </div>

      {/* ═══ NAV ═══ */}
      <nav className="nav">
        <button className={`nav-link ${currentPage === 'app' ? 'active' : ''}`} onClick={() => navTo('app')}>Dig</button>
        <button className={`nav-link ${currentPage === 'how-it-works' ? 'active' : ''}`} onClick={() => navTo('how-it-works')}>How It Works</button>
        <button className={`nav-link ${currentPage === 'about' ? 'active' : ''}`} onClick={() => navTo('about')}>About</button>
      </nav>

      {/* ═══ PAGE: HOW IT WORKS ═══ */}
      {currentPage === 'how-it-works' && (
        <div className="page-content fade-in">
          <h2>How It Works</h2>
          <p>Crate Digger lets you search the Discogs database — the closest thing the internet has to a complete catalog of every record ever pressed — and turn what you find into Spotify playlists. It’s built for the kind of browsing that algorithms can’t replicate: wandering through a year, a genre, a label, and seeing what’s there.</p>

          <h3>The Basics</h3>

          <div className="step-block">
            <div className="step-num">Step 1 — Connect Spotify</div>
            <p>Click <strong style={{color:'var(--spotify-green)'}}>Connect Spotify</strong> in the header. This uses OAuth, so your password never touches this site. You get redirected to Spotify, approve access, and bounce back.</p>
            <p className="dim">Spotify connection is optional — you can browse Discogs and use the YouTube / Apple Music / Bandcamp links without it. You just need it for playlist creation.</p>
          </div>

          <div className="step-block">
            <div className="step-num">Step 2 — Search</div>
            <p>The search bar is where it gets interesting. You can combine any of these:</p>
            <div className="field-grid">
              <span className="key">Year</span><span className="desc">A single year. Try 1972, or 1986, or 2003.</span>
              <span className="key">Artist</span><span className="desc">Search by artist name only — won't match labels or titles that share the word.</span>
              <span className="key">Release title</span><span className="desc">Search by album/release title only.</span>
              <span className="key">Genre</span><span className="desc">Top-level Discogs genres — Rock, Jazz, Electronic, Latin, etc.</span>
              <span className="key">Style</span><span className="desc">Populates when you pick a genre. This is where it gets specific: Krautrock, Bossa Nova, Dungeon Synth, Bayou Funk.</span>
              <span className="key">Label</span><span className="desc">Search by record label. Try “Blue Note” or “Warp” or “Fania”.</span>
              <span className="key">Country</span><span className="desc">Country of release. “US”, “UK”, “Japan”, “Brazil”.</span>
              <span className="key">Credited musician</span><span className="desc">Find everything a specific musician played on — not just their own records. Crate Digger resolves names to exact artist entities, so you get precise results.</span>
              <span className="key">Track title</span><span className="desc">Search for a specific song name across all releases.</span>
              <span className="key">Cat #</span><span className="desc">Search by catalog number — useful if you know the exact pressing.</span>

            <p>Hit <strong style={{color:'var(--cardboard-light)'}}>Dig</strong> to search. Results come 20 at a time with pagination.</p>
          </div>

          <div className="step-block">
            <div className="step-num">Step 3 — Browse & Select</div>
            <p>Click any result to expand it — you’ll see the full tracklist and credits. Every individual track has YouTube and Spotify search links so you can listen before committing.</p>
            <p>Click the checkbox to select releases for your playlist. Selections persist as you page through results.</p>

          <div className="step-block">
            <div className="step-num">Step 4 — Match & Build</div>
            <p>Go to the <strong style={{color:'var(--cardboard-light)'}}>Selected</strong> tab and hit <strong style={{color:'var(--spotify-green)'}}>Match to Spotify</strong>. Crate Digger searches Spotify for each album and shows what it found and what it didn’t.</p>
            <p>Then go to <strong style={{color:'var(--cardboard-light)'}}>Build Playlist</strong>. Name it, click create, and all matched tracks land in a new playlist in your Spotify account. Anything not on Spotify gets fallback links to YouTube, Apple Music, YouTube Music, and Bandcamp.</p>
          </div>

          <h3>Shortcuts & Tricks</h3>

          <div className="tip-block">
            <strong>Clickable metadata:</strong> In search results, genre tags, style tags, labels, and country names are all clickable — they re-run your search filtered to that value. Same for credited musicians in the expanded view. This is how you fall down rabbit holes.
          </div>

            <strong>“Release only” results:</strong> Some records don’t have a “master release” in Discogs — one-off pressings, white labels, obscurities that never got consolidated. These show up tagged “release only” and tend to be where the most interesting finds live.

          <h3>What This Is Not</h3>
          <p>Crate Digger does not recommend anything. There’s no “you might also like.” You pick the year, the genre, the label. You decide what to listen to based on what you find. The tool just makes Discogs navigable and connects it to your streaming services.</p>

          <p style={{marginTop:'2rem'}}>
            <button className="btn btn-primary" onClick={() => navTo('app')}>Start Digging →</button>
          </p>
        </div>
      )}

      {/* ═══ PAGE: ABOUT ═══ */}
      {currentPage === 'about' && (
        <div className="page-content fade-in">
          <h2>About</h2>
          <p>Crate Digger is essentially a music search engine that makes it easier to discover interesting, eclectic music that you wouldn't otherwise stumble across — visit <a href="#" onClick={(e) => { e.preventDefault(); navTo('how-it-works'); }}>"How It Works"</a> to get a feel for it.</p>
          <p>I built this site because I want more people to discover music on their own terms, rather than having it fed to them by an incessant machine that typifies you and slowly shapes your preferences until you are listening to the same exact thing everyone else in your demographic likes.</p>
          <p>The Internet as we currently interact with it is like a museum — the recommendation layer does the excavation work and decides what is worth listening to and what should stay in the ground. But there's nothing stopping us from becoming archaeologists and digging up whatever we please. Until now there has never been a way to easily comb through the musical archives like you would at a record store. This site does not do recommendations, and it will not show you artists that are similar to your search results. The point of Crate Digger is for you to take control of discovery, so that music can surprise you again.</p>
          <p>Crate Digger grew out of <a href="https://thecside.substack.com" target="_blank" rel="noopener">The C-Side</a>, my larger project of making the dark and dusty corners of the Internet more accessible to culture hounds. We have been told that record stores, video stores, rare bookshops, and the like will be consigned to obscurity and irrelevance in the digital age. But there is no actual reason why this should be the case — in fact it is easier than ever to find crazy shit, because you have access to the entire world, and the millions of other people who are also trying to find crazy shit. Eventually I will build out other corresponding sites for video, literature, and other things. But for now it's just Crate Digger. Enjoy, and keep digging.</p>
        </div>
      )}

      {/* ═══ MAIN APP ═══ */}
      {currentPage === 'app' && (<>

      {/* ═══ SETUP ═══ */}

      {/* ═══ SEARCH ═══ */}

                </div>
                <div className="release-actions" onClick={e => e.stopPropagation()}>
                  <a className="spotify-link" href="#" onClick={(e) => openSpotifySearch(artist, title, r.year, r.format, e)} title="Opens app if installed, otherwise web player">♫ Spotify ↗</a>
                  <a className="apple-link" href={appleMusicSearchUrl(artist, title, r.year, r.format)} target="_blank" rel="noopener">♫ Apple Music ↗</a>
                  <a className="ytmusic-link" href={ytMusicSearchUrl(artist, title, r.year, r.format)} target="_blank" rel="noopener">♬ YT Music ↗</a>
                  <a className="yt-link" href={ytSearchUrl(artist, title, r.year, r.format)} target="_blank" rel="noopener">▶ YouTube ↗</a>
                  <a className="bandcamp-link" href={bandcampSearchUrl(artist, title, r.year, r.format)} target="_blank" rel="noopener">Bandcamp ↗</a>
                  {r.uri && (
                    <a className="discogs-link" href={discogsUrl(r.uri)} target="_blank" rel="noopener">Discogs ↗</a>
                  )}
                </div>
              </div>
              {expandedId === (r.master_id || r.id) && (
                <div className="card-detail">
                  {detailLoading && !detailCache[r.master_id || r.id] ? (
                    <div className="card-detail-loading"><span className="spinner"></span>Loading tracklist & credits…</div>
                  ) : detailCache[r.master_id || r.id] ? (() => {
                    const d = detailCache[r.master_id || r.id];
                    if (d.error) return <div className="card-detail-loading" style={{color:'var(--red)'}}>Error: {d.error}</div>;
                    return (
                      <div className="detail-columns">
                        <div>
                          <div className="tracklist-header">Tracklist</div>
                          {d.tracklist.length > 0 ? d.tracklist.map((t, ti) => (
                            <div key={ti} className="track-row">
                              <span className="track-pos">{t.position}</span>
                              <span className="track-title meta-click" onClick={(e) => { e.stopPropagation(); searchByTrack(t.title); }}>{t.title}</span>
                              {t.duration && <span className="track-dur">{t.duration}</span>}
                              <a className="yt-link" href={ytTrackSearchUrl(artist, t.title, r.year)} target="_blank" rel="noopener" onClick={e => e.stopPropagation()} style={{fontSize:'0.55rem',padding:'0.1rem 0.25rem',marginLeft:'0.3rem'}}>▶ YT</a>
                              <a className="spotify-link" href="#" onClick={(e) => { e.stopPropagation(); openSpotifySearch(artist, t.title, r.year, null, e); }} style={{fontSize:'0.55rem',padding:'0.1rem 0.25rem'}}>♫</a>
                            </div>
                          )) : <div style={{color:'var(--paper-dim)',fontSize:'0.65rem'}}>No tracklist available</div>}
                        </div>
                        <div>
                          <div className="credits-header">Credits</div>
                          {d.extraartists.length > 0 ? d.extraartists.map((ea, ei) => (
                            <div key={ei} className="credit-row">
                              <span className="credit-name" onClick={(e) => { e.stopPropagation(); searchByArtist(ea.name, ea.id); }}>{ea.name.replace(/\s*\(\d+\)\s*$/, "")}</span>
                              <span className="credit-role">{ea.role}</span>
                            </div>
                          )) : d.artists.length > 0 ? d.artists.map((a, ai) => (
                            <div key={ai} className="credit-row">
                              <span className="credit-name" onClick={(e) => { e.stopPropagation(); searchByArtist(a.name, a.id); }}>{a.name.replace(/\s*\(\d+\)\s*$/, "")}</span>
                              <span className="credit-role">Primary artist</span>
                            </div>
                          )) : <div style={{color:'var(--paper-dim)',fontSize:'0.65rem'}}>No credits available</div>}

                          {/* MusicBrainz supplemental credits */}
                          {(() => {
                            const cardId = r.master_id || r.id;
                            const mbData = mbCreditsCache[cardId];
                            if (mbData === "loading") {
                              return (
                                <div className="mb-credits-section">
                                  <div className="mb-credits-header">
                                    <span className="mb-badge">MusicBrainz</span>
                                    <span className="spinner" style={{width:10,height:10,borderWidth:1.5,marginRight:0}}></span>
                                    loading additional credits…
                                  </div>
                                </div>
                              );
                            }
                            if (mbData && Array.isArray(mbData) && mbData.length > 0) {
                              // Filter out MB credits that already appear in Discogs credits
                              const discogsNames = new Set([
                                ...(d.extraartists || []).map(ea => ea.name.replace(/\s*\(\d+\)\s*$/, "").toLowerCase()),
                                ...(d.artists || []).map(a => a.name.replace(/\s*\(\d+\)\s*$/, "").toLowerCase()),
                              ]);
                              const uniqueMb = mbData.filter(c => !discogsNames.has(c.name.toLowerCase()));
                              if (uniqueMb.length === 0) return null;
                              return (
                                <div className="mb-credits-section">
                                  <div className="mb-credits-header">
                                    <span className="mb-badge">MusicBrainz</span>
                                    Additional credits
                                  </div>
                                  {uniqueMb.map((c, ci) => (
                                    <div key={ci} className="mb-credit-row">
                                      <span className="mb-credit-name">{c.name}</span>
                                      <span className="mb-credit-role">{c.role}</span>
                                    </div>
                                  ))}
                                </div>
                              );
                            }
                            return null;
                          })()}
                        </div>
                      </div>
                    );
                  })() : null}
                </div>
              )}
              </React.Fragment>
            );
          })}

          {!loading && results.length === 0 && (
            <div className="empty">
              <span className="empty-icon">📦</span>
              Set your search criteria and hit Search to start digging.
            </div>
          )}

          {/* Pagination */}
          {pagination && pagination.pages > 1 && (
            <div className="pagination">
              <button className="btn btn-sm" onClick={() => searchDiscogs(page - 1)} disabled={page <= 1 || loading}>
                ← Prev
              </button>
              <span className="page-info">
                Page {page} of {pagination.pages}
              </span>
              <button className="btn btn-sm" onClick={() => searchDiscogs(page + 1)} disabled={page >= pagination.pages || loading}>
                Next →
              </button>
            </div>
          )}
        </div>
      )}

      {/* ═══ SELECTED TAB ═══ */}
      {tab === 'selected' && (
        <div className="results fade-in">
          {selectedList.length === 0 ? (
            <div className="empty">
              <span className="empty-icon">🎯</span>
              No releases selected yet. Go to Results and click to select.
            </div>
          ) : (
            <>
              <div className="select-bar">
                <div style={{display:'flex',gap:'0.5rem'}}>
                  <button className="btn btn-sm btn-spotify" onClick={matchToSpotify} disabled={matching || !spotifyToken}>
                    {matching ? <><span className="spinner"></span>Matching ({matchProgress.done}/{matchProgress.total})</> : "Match to Spotify"}
                  </button>
                  <button className="btn btn-sm btn-danger" onClick={clearSelected}>Clear all</button>
                </div>
                <span style={{fontFamily:'var(--font-mono)',fontSize:'0.7rem',color:'var(--cream-dim)'}}>
                  {matchedCount > 0 && `${matchedCount} matched · ${unmatchedEntries.length} not found`}
                </span>
              </div>

              {matching && (
                <div className="loading-bar">
                  <div className="loading-bar-fill" style={{width: `${(matchProgress.done / matchProgress.total) * 100}%`}} />
                </div>
              )}

              {selectedList.map(([id, release]) => {
                const { artist, title } = parseTitle(release.title);
                const match = spotifyMatches[id];
                return (
                  <div key={id} className="release-card selected" onClick={() => toggleSelect(release)}>
                    <div className="release-check"><CheckIcon /></div>
                    {release.thumb ? (
                      <img className="release-thumb" src={release.thumb} alt="" loading="lazy" />
                    ) : (
                      <div className="release-thumb" style={{display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1.2rem',color:'var(--border-light)'}}>♫</div>
                    )}
                    <div className="release-info">
                      <h3>{artist ? <><span style={{color:'var(--cardboard-light)',fontWeight:700}}>{artist}</span> — {title}</> : release.title}</h3>
                      <div className="release-meta">
                        {release.year && <span>{release.year}</span>}
                        {release.country && <span>{release.country}</span>}
                        {release.format && <span>{release.format.join(", ")}</span>}
                      </div>
                    </div>
                    <div className="release-actions" onClick={e => e.stopPropagation()}>
                      {match === undefined ? (
                        <span className="match-badge match-none">not matched</span>
                      ) : match ? (
                        <a href={match.url} target="_blank" rel="noopener" className="match-badge match-spotify" style={{textDecoration:'none'}}>
                          ♫ {match.artist} — {match.name} ↗
                        </a>
                      ) : (
                        <a className="yt-link" href={ytSearchUrl(artist, title, release.year, release.format)} target="_blank" rel="noopener">
                          YouTube search ↗
                        </a>
                      )}
                    </div>
                  </div>
                );
              })}
            </>
          )}
        </div>
      )}

      {/* ═══ PLAYLIST TAB ═══ */}
      {tab === 'playlist' && (
        <div className="results fade-in">
          {selectedList.length === 0 ? (
            <div className="empty">
              <span className="empty-icon">🎵</span>
              Select some releases first, then match them to Spotify.
            </div>
          ) : matchedCount === 0 && !matching ? (
            <div className="empty">
              <span className="empty-icon">🔍</span>
              Go to the Selected tab and click "Match to Spotify" first.
            </div>
          ) : (
            <div className="playlist-builder">
              <h3>Create Spotify Playlist</h3>
              <p style={{fontSize:'0.82rem',color:'var(--cream-dim)',marginBottom:'1rem'}}>
                {matchedCount} of {selectedList.length} releases found on Spotify.
                All tracks from matched albums will be added.
              </p>
              <div className="playlist-input-row">
                <input
                  value={playlistName}
                  onChange={e => setPlaylistName(e.target.value)}
                  placeholder={`Crate Digger – ${year || "Mixed"}`}
                />
                <button
                  className="btn btn-spotify"
                  onClick={createPlaylist}
                  disabled={creating || matchedCount === 0}
                >
                  {creating ? <><span className="spinner"></span>Creating…</> : "Create Playlist"}
                </button>
              </div>

              {playlistResult && (
                <div className="success-panel">
                  <p style={{fontSize:'0.9rem',marginBottom:'0.5rem',color:'var(--green)'}}>
                    ✓ Playlist created — {playlistResult.trackCount} tracks added
                  </p>
                  <a href={playlistResult.url} target="_blank" rel="noopener">
                    Open "{playlistResult.name}" in Spotify ↗
                  </a>
                </div>
              )}

              {/* Unmatched releases with YouTube links */}
              {unmatchedEntries.length > 0 && (
                <div className="unmatched-section">
                  <h4>Not on Spotify — YouTube links ({unmatchedEntries.length})</h4>
                  {unmatchedEntries.map(([id, release]) => {
                    const { artist, title } = parseTitle(release.title);
                    return (
                      <div key={id} className="unmatched-item">
                        <span>{artist ? <><strong style={{color:'var(--cream)'}}>{artist}</strong> — {title}</> : release.title}</span>
                        <div style={{display:'flex',gap:'0.4rem',flexWrap:'wrap'}}>
                          <a className="spotify-link" href="#" onClick={(e) => openSpotifySearch(artist, title, release.year, release.format, e)} title="Opens app if installed, otherwise web player">♫ Spotify ↗</a>
                          <a className="apple-link" href={appleMusicSearchUrl(artist, title, release.year, release.format)} target="_blank" rel="noopener">Apple Music ↗</a>
                          <a className="ytmusic-link" href={ytMusicSearchUrl(artist, title, release.year, release.format)} target="_blank" rel="noopener">YT Music ↗</a>
                          <a className="yt-link" href={ytSearchUrl(artist, title, release.year, release.format)} target="_blank" rel="noopener">YouTube ↗</a>
                          <a className="bandcamp-link" href={bandcampSearchUrl(artist, title, release.year, release.format)} target="_blank" rel="noopener">Bandcamp ↗</a>
                          {release.uri && <a className="discogs-link" href={discogsUrl(release.uri)} target="_blank" rel="noopener">Discogs ↗</a>}
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          )}
        </div>
      )}
    </>)}
    {/* ═══ ARTIST DISAMBIGUATION PICKER ═══ */}
    {disambigCandidates && (
      <div className="disambig-overlay" onClick={cancelDisambig}>
        <div className="disambig-panel" onClick={e => e.stopPropagation()}>
          <h3>Which "{credit || 'artist'}"?</h3>
          {disambigCandidates.map(a => (
            <div key={a.id} className="disambig-item" onClick={() => selectDisambigArtist(a)}>
              {a.thumb ? (
                <img className="disambig-thumb" src={a.thumb} alt="" />
              ) : (
                <div className="disambig-thumb" style={{display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1rem',color:'var(--border-light)'}}>♫</div>
              )}
              <div className="disambig-info">
                <div className="disambig-name">{a.name}</div>
                {a.detail && <div className="disambig-detail">{a.detail}</div>}
              </div>
            </div>
          ))}
          <div className="disambig-cancel">
            <button className="btn btn-sm" onClick={cancelDisambig}>Skip — search all credits</button>
          </div>
        </div>
      </div>
    )}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>
</body>
</html>
