<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crate Digger</title>
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Courier+Prime:wght@400;700&family=Special+Elite&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1e1a14;
    --surface: #28231a;
    --surface2: #302a1f;
    --cardboard: #a8894a;
    --cardboard-dark: #7a6332;
    --cardboard-light: #c4a45a;
    --paper: #d8ccb0;
    --paper-dim: #8a7e68;
    --ink: #1e1a14;
    --red: #b83a2e;
    --green-dim: #4a6a3a;
    --spotify-green: #1db954;
    --youtube-red: #ff0033;
    --border: #3a3228;
    --border-light: #4a4030;
    --stain1: rgba(90, 70, 30, 0.08);
    --stain2: rgba(60, 40, 20, 0.06);
    --font-header: 'Oswald', Impact, sans-serif;
    --font-typed: 'Courier Prime', 'Courier New', monospace;
    --font-scrawl: 'Special Elite', serif;
    --font-display: 'Oswald', Impact, sans-serif;
    --font-body: 'Courier Prime', 'Courier New', monospace;
    --font-mono: 'Courier Prime', 'Courier New', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--paper);
    font-family: var(--font-typed);
    font-size: 12.5px;
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 9999;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='5' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    opacity: 0.09;
  }
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 9998;
    background:
      radial-gradient(ellipse at 20% 50%, var(--stain1) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 30%, var(--stain2) 0%, transparent 40%),
      radial-gradient(ellipse at 50% 90%, var(--stain1) 0%, transparent 45%);
  }

  /* ─── Header ─── */
  .header {
    padding: 1.5rem 2rem 1rem;
    border-bottom: 3px solid var(--border);
    position: relative;
  }
  .header::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: repeating-linear-gradient(
      90deg,
      var(--cardboard-dark) 0px, var(--cardboard-dark) 4px,
      var(--border) 4px, var(--border) 7px,
      var(--cardboard-dark) 7px, var(--cardboard-dark) 9px,
      transparent 9px, transparent 14px
    );
    opacity: 0.7;
  }
  .header h1 {
    font-family: var(--font-header);
    font-size: 3rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--cardboard-light);
    line-height: 0.9;
    filter: url(#distress);
  }
  .header h1 span {
    font-family: var(--font-typed);
    font-size: 0.23em;
    color: var(--paper-dim);
    letter-spacing: 0.02em;
    display: block;
    margin-top: 0.4rem;
    text-transform: none;
    filter: none;
    font-weight: 400;
  }
  .header-row {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 1rem;
    flex-wrap: wrap;
  }
  .auth-status {
    display: flex;
    gap: 0.5rem;
    align-items: center;
    flex-wrap: wrap;
  }
  .badge {
    font-family: var(--font-typed);
    font-size: 0.65rem;
    font-weight: 400;
    padding: 0.2rem 0.45rem;
    border-radius: 1px;
    letter-spacing: 0.02em;
    border: 1px solid transparent;
  }
  .badge-ok { background: var(--green-dim); color: #b8d4a8; border-color: #3a5a2a; }
  .badge-off { background: var(--border); color: var(--paper-dim); }
  .badge-spotify { background: #15823b; color: #b8f0ce; border-color: #0d6a2f; }

  /* ─── Layout ─── */
  .app {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 1.5rem 4rem;
  }

  /* ─── Setup Panel ─── */
  .setup-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 1.5rem;
    margin: 1.5rem 0;
  }
  .setup-panel h2 {
    font-family: var(--font-header);
    font-size: 1rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--cardboard-light);
    margin-bottom: 1rem;
  }
  .setup-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 1rem;
  }
  .setup-group label {
    font-family: var(--font-typed);
    font-size: 0.6rem;
    color: var(--paper-dim);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    display: block;
    margin-bottom: 0.4rem;
  }
  .setup-group input {
    width: 100%;
    background: var(--ink);
    border: 1px solid var(--border);
    color: var(--paper);
    font-family: var(--font-typed);
    font-size: 0.75rem;
    padding: 0.5rem 0.6rem;
    border-radius: 1px;
    outline: none;
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.3);
  }
  .setup-group input:focus { border-color: var(--cardboard-dark); }
  .setup-group input::placeholder { color: var(--border-light); }
  .setup-group .hint {
    font-size: 0.65rem;
    color: var(--paper-dim);
    margin-top: 0.3rem;
    opacity: 0.7;
  }
  .setup-actions {
    margin-top: 1rem;
    display: flex;
    gap: 0.75rem;
    flex-wrap: wrap;
  }

  /* ─── Buttons ─── */
  .btn {
    font-family: var(--font-header);
    font-size: 0.85rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 0.5rem 1rem;
    border: 2px solid var(--cardboard-dark);
    border-radius: 1px;
    background: var(--cardboard-dark);
    color: var(--ink);
    cursor: pointer;
    transition: all 0.1s;
    box-shadow: 2px 2px 0px rgba(0,0,0,0.3);
    white-space: nowrap;
  }
  .btn:hover { background: var(--cardboard); border-color: var(--cardboard); }
  .btn:active { box-shadow: none; transform: translate(1px, 1px); }
  .btn:disabled { opacity: 0.35; cursor: default; }
  .btn:disabled:hover { background: var(--cardboard-dark); border-color: var(--cardboard-dark); }
  .btn-primary {
    background: var(--cardboard-dark);
    border-color: var(--cardboard);
    color: var(--ink);
  }
  .btn-primary:hover { background: var(--cardboard); }
  .btn-spotify {
    background: #15823b;
    border-color: #0d6a2f;
    color: #fff;
  }
  .btn-spotify:hover { background: var(--spotify-green); border-color: var(--spotify-green); }
  .btn-sm { font-size: 0.7rem; padding: 0.3rem 0.6rem; box-shadow: 1px 1px 0 rgba(0,0,0,0.3); }
  .btn-danger { background: transparent; border-color: var(--red); color: var(--red); box-shadow: none; }
  .btn-danger:hover { background: var(--red); color: var(--ink); }

  /* ─── Search Form ─── */
  .search-section { margin-top: 1.2rem; }
  .search-section h2 {
    font-family: var(--font-header);
    font-size: 1rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--paper-dim);
    margin-bottom: 0.6rem;
  }
  .search-form {
    display: grid;
    grid-template-columns: 70px 1fr 130px 140px;
    gap: 0.5rem;
    align-items: end;
  }
  .search-form-row2 {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr 1fr 90px;
    gap: 0.5rem;
    align-items: end;
    margin-top: 0.5rem;
  }
  @media (max-width: 900px) {
    .search-form { grid-template-columns: 1fr 1fr 1fr; }
    .search-form-row2 { grid-template-columns: 1fr 1fr 1fr; }
  }
  @media (max-width: 580px) {
    .search-form { grid-template-columns: 1fr 1fr; }
    .search-form-row2 { grid-template-columns: 1fr 1fr; }
  }
  .field label {
    font-family: var(--font-typed);
    font-size: 0.6rem;
    color: var(--paper-dim);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    display: block;
    margin-bottom: 0.25rem;
  }
  .field input, .field select {
    width: 100%;
    background: var(--ink);
    border: 1px solid var(--border);
    color: var(--paper);
    font-family: var(--font-typed);
    font-size: 0.75rem;
    padding: 0.5rem 0.6rem;
    border-radius: 1px;
    outline: none;
    transition: border-color 0.2s;
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.3);
  }
  .field input:focus, .field select:focus { border-color: var(--cardboard-dark); }
  .field select { cursor: pointer; }
  .field select option { background: var(--surface); }
  .field input::placeholder { color: var(--border-light); }

  /* ─── Tabs ─── */
  .tabs {
    display: flex;
    gap: 0;
    margin-top: 1.2rem;
    border-bottom: 2px solid var(--border);
  }
  .tab {
    font-family: var(--font-typed);
    font-size: 0.7rem;
    font-weight: 400;
    padding: 0.5rem 1rem;
    background: none;
    border: none;
    color: var(--paper-dim);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.1s;
    margin-bottom: -2px;
    letter-spacing: 0.03em;
  }
  .tab:hover { color: var(--paper); }
  .tab.active {
    color: var(--cardboard-light);
    border-bottom-color: var(--cardboard-dark);
    background: rgba(168, 137, 74, 0.05);
  }
  .tab .count {
    background: var(--border);
    color: var(--paper-dim);
    font-size: 0.58rem;
    padding: 0.08rem 0.35rem;
    border-radius: 1px;
    margin-left: 0.3rem;
  }
  .tab.active .count { background: var(--cardboard-dark); color: var(--ink); }

  /* ─── Results ─── */
  .results { margin-top: 0.5rem; }
  .results-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.5rem;
  }
  .results-count {
    font-family: var(--font-typed);
    font-size: 0.65rem;
    color: var(--paper-dim);
  }
  .release-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 0.7rem 0.8rem;
    margin-bottom: 3px;
    display: grid;
    grid-template-columns: 28px 48px 1fr auto;
    gap: 0.6rem;
    align-items: center;
    transition: background 0.1s;
    cursor: pointer;
    position: relative;
  }
  .release-card:nth-child(even) { background: var(--surface2); }
  .release-card:hover { background: #342e22; }
  .release-card.selected {
    background: #2e2818;
    border-color: var(--cardboard-dark);
    border-left: 3px solid var(--cardboard);
  }
  .release-check {
    width: 18px;
    height: 18px;
    border: 1.5px solid var(--border-light);
    border-radius: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .release-card.selected .release-check {
    border-color: var(--cardboard);
    background: var(--cardboard);
  }
  .release-check svg { opacity: 0; transition: opacity 0.15s; }
  .release-card.selected .release-check svg { opacity: 1; }
  .release-thumb {
    width: 48px;
    height: 48px;
    border-radius: 1px;
    background: var(--border);
    object-fit: cover;
    flex-shrink: 0;
    filter: saturate(0.7) contrast(1.1) brightness(0.95);
    border: 1px solid rgba(0,0,0,0.3);
  }
  .release-info h3 {
    font-family: var(--font-typed);
    font-size: 0.82rem;
    font-weight: 400;
    color: var(--paper);
    line-height: 1.25;
  }
  .release-meta {
    font-family: var(--font-typed);
    font-size: 0.6rem;
    color: var(--paper-dim);
    margin-top: 0.15rem;
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .release-meta span { opacity: 0.8; }
  .release-actions {
    display: flex;
    gap: 0.25rem;
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  .match-badge {
    font-family: var(--font-typed);
    font-size: 0.58rem;
    padding: 0.15rem 0.35rem;
    border-radius: 1px;
    white-space: nowrap;
  }
  .match-spotify { background: #15823b; color: #b8f0ce; }
  .match-youtube { background: #661122; color: #ffaaaa; }
  .match-none { background: var(--border); color: var(--paper-dim); }

  /* ─── Service links ─── */
  .spotify-link, .yt-link, .apple-link, .ytmusic-link, .discogs-link {
    font-family: var(--font-typed);
    font-size: 0.58rem;
    text-decoration: none;
    padding: 0.15rem 0.35rem;
    border: 1px solid var(--border);
    border-radius: 1px;
    transition: all 0.1s;
    white-space: nowrap;
  }
  .spotify-link { color: #4a9a5a; border-color: #2a4a2a; }
  .spotify-link:hover { background: #15823b; color: #fff; border-color: #15823b; }
  .apple-link { color: #c06068; border-color: #4a2028; }
  .apple-link:hover { background: #882838; color: #fff; border-color: #882838; }
  .ytmusic-link { color: #aa5555; border-color: #4a2222; }
  .ytmusic-link:hover { background: #882222; color: #fff; border-color: #882222; }
  .yt-link { color: #aa5555; border-color: #4a2222; }
  .yt-link:hover { background: #882222; color: #fff; border-color: #882222; }
  .discogs-link { color: var(--cardboard-dark); border-color: var(--border); }
  .discogs-link:hover { background: var(--cardboard-dark); color: var(--ink); border-color: var(--cardboard-dark); }

  /* ─── Pagination ─── */
  .pagination {
    display: flex;
    justify-content: center;
    gap: 0.5rem;
    margin-top: 0.8rem;
    padding-top: 0.8rem;
    border-top: 1px solid var(--border);
  }
  .page-info {
    font-family: var(--font-typed);
    font-size: 0.65rem;
    color: var(--paper-dim);
    display: flex;
    align-items: center;
  }

  /* ─── Playlist Builder ─── */
  .playlist-builder {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 1.5rem;
    margin-top: 1rem;
  }
  .playlist-builder h3 {
    font-family: var(--font-header);
    font-size: 1rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--cardboard-light);
    margin-bottom: 1rem;
  }
  .playlist-input-row {
    display: flex;
    gap: 0.6rem;
    margin-bottom: 1rem;
  }
  .playlist-input-row input {
    flex: 1;
    background: var(--ink);
    border: 1px solid var(--border);
    color: var(--paper);
    font-family: var(--font-typed);
    font-size: 0.75rem;
    padding: 0.5rem 0.6rem;
    border-radius: 1px;
    outline: none;
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.3);
  }
  .playlist-input-row input:focus { border-color: var(--cardboard-dark); }
  .unmatched-section { margin-top: 1.5rem; }
  .unmatched-section h4 {
    font-family: var(--font-typed);
    font-size: 0.7rem;
    color: var(--paper-dim);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 0.6rem;
  }
  .unmatched-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.5rem 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.78rem;
  }

  /* ─── Loading ─── */
  .spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid var(--border);
    border-top-color: var(--cardboard);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    margin-right: 0.5rem;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-bar {
    height: 3px;
    background: var(--border);
    border-radius: 1px;
    overflow: hidden;
    margin: 1rem 0;
  }
  .loading-bar-fill {
    height: 100%;
    background: var(--cardboard);
    border-radius: 1px;
    transition: width 0.3s;
  }

  /* ─── Empty states ─── */
  .empty {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--paper-dim);
    font-family: var(--font-scrawl);
    font-size: 0.85rem;
  }
  .empty-icon { font-size: 2rem; margin-bottom: 0.5rem; display: block; }

  /* ─── Success panel ─── */
  .success-panel {
    background: #14291c;
    border: 1px solid var(--green-dim);
    border-radius: 2px;
    padding: 1.25rem;
    margin-top: 1rem;
    text-align: center;
  }
  .success-panel a {
    color: var(--spotify-green);
    font-family: var(--font-typed);
    font-size: 0.8rem;
  }

  /* ─── Error ─── */
  .error-msg {
    background: #2a1515;
    border: 1px solid #5a2a2a;
    color: #e8a0a0;
    font-family: var(--font-typed);
    font-size: 0.7rem;
    padding: 0.5rem 0.8rem;
    border-radius: 1px;
    margin-top: 0.5rem;
  }

  /* ─── Select all bar ─── */
  .select-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.5rem 0;
    margin-bottom: 0.3rem;
  }

  /* ─── Animations ─── */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .fade-in { animation: fadeIn 0.2s ease-out forwards; }

  /* ─── Toggle ─── */
  .toggle-link {
    background: none;
    border: none;
    color: var(--paper-dim);
    font-family: var(--font-typed);
    font-size: 0.65rem;
    cursor: pointer;
    text-decoration: underline;
    text-underline-offset: 2px;
    text-decoration-color: var(--border-light);
  }
  .toggle-link:hover { color: var(--paper); }


  /* ─── Clickable metadata ─── */
  .meta-click {
    cursor: pointer;
    text-decoration: underline;
    text-decoration-style: dashed;
    text-underline-offset: 2px;
    text-decoration-color: var(--border-light);
    transition: color 0.1s;
  }
  .meta-click:hover {
    color: var(--cardboard-light);
    text-decoration-color: var(--cardboard-dark);
  }

  /* ─── Filter banner ─── */
  .filter-banner {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    flex-wrap: wrap;
    padding: 0.6rem 0.8rem;
    margin-top: 0.6rem;
    margin-bottom: 0.4rem;
    background: var(--surface2);
    border: 1px solid var(--cardboard-dark);
    border-left: 3px solid var(--cardboard);
    border-radius: 1px;
    font-family: var(--font-typed);
    font-size: 0.68rem;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .filter-banner-label {
    color: var(--paper-dim);
    margin-right: 0.2rem;
  }
  .filter-chip {
    display: inline-flex;
    align-items: center;
    gap: 0.25rem;
    background: var(--cardboard-dark);
    color: var(--ink);
    font-family: var(--font-typed);
    font-size: 0.6rem;
    padding: 0.15rem 0.4rem;
    border-radius: 1px;
    white-space: nowrap;
  }
  .filter-chip-x {
    cursor: pointer;
    opacity: 0.7;
    font-size: 0.75rem;
    line-height: 1;
    transition: opacity 0.1s;
  }
  .filter-chip-x:hover { opacity: 1; }
  .filter-clear {
    margin-left: auto;
    color: var(--red);
    cursor: pointer;
    font-family: var(--font-typed);
    font-size: 0.6rem;
    background: none;
    border: none;
    text-decoration: underline;
    text-underline-offset: 2px;
  }
  .filter-clear:hover { color: #e05040; }


  /* ─── Expanded card detail ─── */
  .card-detail {
    background: var(--ink);
    border: 1px solid var(--border);
    border-top: none;
    margin-top: -3px;
    margin-bottom: 3px;
    padding: 0.8rem 1rem;
    font-family: var(--font-typed);
    font-size: 0.72rem;
    animation: slideDown 0.15s ease-out;
  }
  @keyframes slideDown {
    from { opacity: 0; max-height: 0; padding: 0 1rem; }
    to { opacity: 1; max-height: 600px; padding: 0.8rem 1rem; }
  }
  .card-detail-loading {
    color: var(--paper-dim);
    padding: 0.5rem 0;
  }
  .detail-columns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }
  @media (max-width: 600px) {
    .detail-columns { grid-template-columns: 1fr; }
  }

  /* Tracklist */
  .tracklist-header {

// Parse "Artist - Title" from Discogs title
function parseTitle(t) {
  if (!t) return { artist: "", title: t || "" };
  const idx = t.indexOf(" - ");
  if (idx === -1) return { artist: "", title: t };
  let artist = t.slice(0, idx).trim();
  // Strip Discogs disambiguation numbers like (2), (3), etc.
  artist = artist.replace(/\s*\(\d+\)\s*$/, "");
  return { artist, title: t.slice(idx + 3).trim() };
}

function ytSearchUrl(artist, title) {
  const q = encodeURIComponent(`${artist} ${title}`.trim());
  return `https://www.youtube.com/results?search_query=${q}`;
}

function spotifySearchUrl(artist, title) {
  const q = encodeURIComponent(`${artist} ${title}`.trim());

function spotifyWebSearchUrl(artist, title) {

}

function openSpotifySearch(artist, title, e) {
  if (e) e.preventDefault();
  const q = encodeURIComponent(`${artist} ${title}`.trim());
  const appUri = `spotify:search:${q}`;
  const webUrl = `https://open.spotify.com/search/${q}`;
  const start = Date.now();
  let didBlur = false;
  const onBlur = () => { didBlur = true; };
  window.addEventListener("blur", onBlur);
  window.location.href = appUri;
  setTimeout(() => {
    window.removeEventListener("blur", onBlur);
    if (!didBlur && Date.now() - start < 2000) {
      window.open(webUrl, "_blank");
    }
  }, 800);
}

    const arr = new Uint8Array(len || 64);
    crypto.getRandomValues(arr);
    const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~";
    return Array.from(arr, function(b) { return chars[b % chars.length]; }).join("");
  }
  async function pkceChallenge(verifier) {
    const data = new TextEncoder().encode(verifier);
    const digest = await crypto.subtle.digest("SHA-256", data);
    return btoa(String.fromCharCode.apply(null, new Uint8Array(digest)))
      .replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
  }

      body: new URLSearchParams({

        if (sortBy) {
          fallbackUrl.searchParams.set("sort", sortBy);
          fallbackUrl.searchParams.set("sort_order", sortOrder);
        }
        const fallbackRes = await fetch(fallbackUrl.toString());
        if (fallbackRes.ok) {
          const fallbackData = await fallbackRes.json();
          mainResults = fallbackData.results || [];
          if (mainResults.length > 0) {
            setPagination(fallbackData.pagination || null);
          }
        }
      }

      // If credit search returned releases, deduplicate by master_id
      if (useCredit && mainResults.length > 0) {
        const seen = new Set();
        mainResults = mainResults.filter(r => {
          if (r.master_id) {
            if (seen.has(r.master_id)) return false;
            seen.add(r.master_id);
          }
          return true;
        });
      }

      // If includeOrphans is on AND we're NOT doing a credit search AND on page 1,
      // do a secondary search for releases without masters
      let orphanResults = [];
      if (includeOrphans && !useCredit && p === 1) {
        try {
          const oUrl = new URL(DISCOGS_API);
          oUrl.searchParams.set("type", "release");
          oUrl.searchParams.set("per_page", "10");
          oUrl.searchParams.set("page", "1");
          if (year) oUrl.searchParams.set("year", year);
          if (genre) oUrl.searchParams.set("genre", genre);
          if (style) oUrl.searchParams.set("style", style);
          if (query) oUrl.searchParams.set("q", query);
          if (country) oUrl.searchParams.set("country", country);
          if (label) oUrl.searchParams.set("label", label);
          if (sortBy) {
            oUrl.searchParams.set("sort", sortBy);
            oUrl.searchParams.set("sort_order", sortOrder);
          }
          const oRes = await fetch(oUrl.toString());
          if (oRes.ok) {
            const oData = await oRes.json();
            const oReleases = oData.results || [];
            // Keep only releases that have NO master_id (orphans)
            orphanResults = oReleases.filter(r => !r.master_id);
          }
        } catch (e) { /* silently fail orphan search */ }
      }

      // Merge: main results first, then orphans (marked)
      const finalResults = [...mainResults];
      if (orphanResults.length > 0) {
        orphanResults.forEach(r => { r._orphan = true; });
        finalResults.push(...orphanResults);
      }

      setResults(finalResults);
      setPagination(data.pagination || null);
    } catch (e) {
      setError(e.message);
      setResults([]);
    } finally {
      setLoading(false);
    }
  };

  // ─── Toggle selection ───
  const toggleSelect = (release) => {
    setSelected(prev => {
      const next = { ...prev };
      if (next[release.id]) {
        delete next[release.id];
      } else {
        next[release.id] = release;
      }
      return next;
    });
  };

  const selectAllOnPage = () => {
    setSelected(prev => {
      const next = { ...prev };
      results.forEach(r => { next[r.id] = r; });
      return next;
    });
  };

  const deselectAllOnPage = () => {
    setSelected(prev => {
      const next = { ...prev };
      results.forEach(r => { delete next[r.id]; });
      return next;
    });
  };

  const clearSelected = () => { setSelected({}); setSpotifyMatches({}); };

  // ─── Match selected to Spotify ───
  const matchToSpotify = async () => {
    if (!spotifyToken) { alert("Connect Spotify first"); return; }
    const entries = Object.entries(selected);
    if (entries.length === 0) return;

    setMatching(true);
    setMatchProgress({ done: 0, total: entries.length });
    const newMatches = { ...spotifyMatches };

    for (let i = 0; i < entries.length; i++) {
      const [id, release] = entries[i];
      if (newMatches[id] !== undefined) {
        setMatchProgress({ done: i + 1, total: entries.length });
        continue; // already matched
      }

      const { artist, title } = parseTitle(release.title);
      const releaseYear = release.year ? String(release.year) : "";
      let q = "";
      if (artist && title) {
        q = `artist:${artist} album:${title}`;
      } else {
        q = release.title;
      }
      if (releaseYear) q += ` year:${releaseYear}`;

      try {
        const url = `${SPOTIFY_API}/search?type=album&limit=5&q=${encodeURIComponent(q)}`;
        const res = await fetch(url, { headers: { Authorization: `Bearer ${spotifyToken}` } });
        if (res.status === 401) {
          setSpotifyToken(null);
          setSpotifyUser(null);
          setError("Spotify session expired. Please reconnect Spotify and try again.");
          break;
        }
        if (res.status === 429) {
          const wait = parseInt(res.headers.get("Retry-After") || "2") * 1000;
          await delay(wait);
          i--; continue;
        }
        if (!res.ok) throw new Error("Spotify search failed");
        const data = await res.json();
        let albums = data.albums?.items || [];

        // If no results with year, try without
        if (albums.length === 0 && releaseYear) {
          const q2 = artist && title ? `artist:${artist} album:${title}` : release.title;
          const url2 = `${SPOTIFY_API}/search?type=album&limit=5&q=${encodeURIComponent(q2)}`;
          const res2 = await fetch(url2, { headers: { Authorization: `Bearer ${spotifyToken}` } });
          if (res2.ok) {
            const data2 = await res2.json();
            albums = data2.albums?.items || [];
          }
          await delay(80);
        }

        if (albums.length > 0) {
          const best = albums[0];
          newMatches[id] = {
            uri: best.uri,
            name: best.name,
            artist: best.artists?.map(a => a.name).join(", ") || "",
            url: best.external_urls?.spotify || "",
            albumId: best.id
          };
        } else {
          newMatches[id] = null;
        }
      } catch (e) {
        newMatches[id] = null;
      }

      setMatchProgress({ done: i + 1, total: entries.length });
      setSpotifyMatches({ ...newMatches });
      await delay(120); // rate limit courtesy
    }

    setSpotifyMatches(newMatches);
    setMatching(false);
  };

  // ─── Create Spotify Playlist ───
  const createPlaylist = async () => {
    if (!spotifyToken || !spotifyUser) { alert("Connect Spotify first"); return; }
    const matched = Object.entries(spotifyMatches).filter(([_, v]) => v !== null);
    if (matched.length === 0) { alert("No Spotify matches found"); return; }

    setCreating(true);
    setPlaylistResult(null);

    try {
      // 1) Create playlist
      const name = playlistName || `Crate Digger – ${year || "Mixed"}`;
      const plRes = await fetch(`${SPOTIFY_API}/me/playlists`, {
        method: "POST",
        headers: {
          Authorization: `Bearer ${spotifyToken}`,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ name, description: `Dug from Discogs via Crate Digger`, public: false })
      });
      if (!plRes.ok) {
        const errBody = await plRes.text();
        if (plRes.status === 401) {
          setSpotifyToken(null);
          setSpotifyUser(null);
          throw new Error("Spotify session expired. Please reconnect Spotify and try again.");
        }
        throw new Error("Failed to create playlist (" + plRes.status + "): " + errBody.slice(0, 200));
      }
      const playlist = await plRes.json();

      // 2) Get track URIs from each album (first track or all tracks)
      const trackUris = [];
      for (const [id, match] of matched) {
        try {
          const tRes = await fetch(`${SPOTIFY_API}/albums/${match.albumId}/tracks?limit=50`, {
            headers: { Authorization: `Bearer ${spotifyToken}` }
          });
          if (tRes.ok) {
            const tData = await tRes.json();
            const uris = (tData.items || []).map(t => t.uri);
            trackUris.push(...uris);
          }
          await delay(80);
        } catch (e) { /* skip */ }
      }

      // 3) Add tracks in batches of 100
      for (let i = 0; i < trackUris.length; i += 100) {
        const batch = trackUris.slice(i, i + 100);
        await fetch(`${SPOTIFY_API}/playlists/${playlist.id}/items`, {
          method: "POST",
          headers: {
            Authorization: `Bearer ${spotifyToken}`,
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ uris: batch })
        });
        await delay(100);
      }

      setPlaylistResult({
        url: playlist.external_urls?.spotify,
        name: playlist.name,
        trackCount: trackUris.length
      });
    } catch (e) {
      setError(e.message);
    } finally {
      setCreating(false);
    }
  };

  // ─── Derived data ───
  const selectedList = Object.entries(selected);
  const matchedCount = Object.values(spotifyMatches).filter(v => v !== null).length;
  const unmatchedEntries = selectedList.filter(([id]) => spotifyMatches[id] === null);
  const allOnPageSelected = results.length > 0 && results.every(r => selected[r.id]);

  // ─── Render ───
  return (
    <div>
      {/* ═══ HEADER ═══ */}
      <div className="header">
        <div className="header-row">
          <h1>Crate Digger <span>discogs → spotify</span></h1>
          <div className="auth-status">
            <span className="badge badge-ok">DISCOGS ✓</span>
            {spotifyUser ? (
              <span className="badge badge-spotify">SPOTIFY: {spotifyUser.display_name}</span>
            ) : spotifyToken ? (
              <span className="badge badge-spotify">SPOTIFY ✓</span>
            ) : (
              <button className="btn btn-sm btn-spotify" onClick={loginSpotify} style={{fontSize:'0.65rem',padding:'0.2rem 0.5rem'}}>Connect Spotify</button>
            )}
            <button className="toggle-link" onClick={() => setShowSetup(!showSetup)}>
              {showSetup ? "hide setup" : "setup"}
            </button>
          </div>
        </div>
      </div>

      {/* ═══ SETUP ═══ */}
      {showSetup && (
        <div className="setup-panel fade-in">
          <h2>API Setup</h2>
          <div className="setup-grid">
            <div className="setup-group">
              <label>Spotify Connection</label>
              {spotifyUser ? (
                <div style={{padding:'0.6rem 0'}}>
                  <span className="badge badge-spotify" style={{fontSize:'0.8rem'}}>
                    Connected as {spotifyUser.display_name}
                  </span>
                </div>
              ) : (
                <>
                  <button className="btn btn-spotify" onClick={loginSpotify} style={{marginTop:'0.2rem'}}>
                    Connect Spotify
                  </button>
                  <div className="hint">Uses OAuth — your credentials stay with Spotify</div>
                </>
              )}
            </div>
          </div>
        </div>
      )}

      {/* ═══ SEARCH ═══ */}
      <div className="search-section">
        <h2>Search</h2>
        <div className="search-form">
          <div className="field">
            <label>Year</label>
            <input value={year} onChange={e => setYear(e.target.value)} placeholder="1972" />
          </div>
          <div className="field">
            <label>Search (optional)</label>
            <input value={query} onChange={e => setQuery(e.target.value)} placeholder="artist, label, title…" />
          </div>
          <div className="field">
            <label>Genre</label>
            <select value={genre} onChange={e => { setGenre(e.target.value); setStyle(""); }}>
              <option value="">All Genres</option>
              {GENRES.filter(Boolean).map(g => <option key={g} value={g}>{g}</option>)}
            </select>
          </div>
          <div className="field">
            <label>Style</label>
            <select value={style} onChange={e => setStyle(e.target.value)} disabled={!genre}>
              <option value="">{genre ? "All Styles" : "Select genre first"}</option>
              {genre && GENRE_STYLES[genre] && GENRE_STYLES[genre].map(s => <option key={s} value={s}>{s}</option>)}
            </select>
          </div>
        </div>
        <div className="search-form-row2">
          <div className="field">
            <label>Country</label>
            <input value={country} onChange={e => setCountry(e.target.value)} placeholder="US, UK…" />
          </div>
          <div className="field">
            <label>Label</label>
            <input value={label} onChange={e => setLabel(e.target.value)} placeholder="Domino, Warp…" />
          </div>
          <div className="field">
            <label>Credited musician</label>
            <input value={credit} onChange={e => setCredit(e.target.value)} placeholder="Damon Albarn…" />
          </div>
          <div className="field">
            <label>Track title</label>
            <input value={track} onChange={e => setTrack(e.target.value)} placeholder="Sister Ray…" />
          </div>
          <div className="field">
            <label>Sort by</label>
            <select value={sortBy} onChange={e => setSortBy(e.target.value)}>
              <option value="">Relevance</option>
              <option value="year">Year</option>
              <option value="title">Title</option>
            </select>
          </div>
          <div className="field" style={{display:'flex',alignItems:'flex-end'}}>
            <button
              className="btn btn-primary"
              onClick={() => searchDiscogs(1)}
              disabled={loading}
              style={{width:'100%'}}
            >
              {loading ? <><span className="spinner"></span>…</> : "Dig"}
            </button>
          </div>
        </div>
        {error && <div className="error-msg">{error}</div>}
      </div>

      {/* ═══ TABS ═══ */}
      <div className="tabs">
        <button className={`tab ${tab === 'search' ? 'active' : ''}`} onClick={() => setTab('search')}>
          Results {pagination && <span className="count">{pagination.items?.toLocaleString()}</span>}
        </button>
        <button className={`tab ${tab === 'selected' ? 'active' : ''}`} onClick={() => setTab('selected')}>
          Selected <span className="count">{selectedList.length}</span>
        </button>
        <button className={`tab ${tab === 'playlist' ? 'active' : ''}`} onClick={() => setTab('playlist')}>
          Build Playlist
        </button>
      </div>

      {/* ═══ FILTER BANNER ═══ */}
      {hasSearched && activeFilters.length > 0 && (
        <div className="filter-banner">
          <span className="filter-banner-label">Showing:</span>
          {activeFilters.map(f => (
            <span key={f.field} className="filter-chip">
              {f.value}
              <span className="filter-chip-x" onClick={() => removeFilter(f.field)}>×</span>
            </span>
          ))}
          <button className="filter-clear" onClick={clearAllFilters}>clear all</button>
        </div>
      )}

      {/* ═══ SEARCH RESULTS TAB ═══ */}
      {tab === 'search' && (
        <div className="results fade-in">
          {results.length > 0 && (
            <div className="select-bar">
              <button className="btn btn-sm" onClick={allOnPageSelected ? deselectAllOnPage : selectAllOnPage}>
                {allOnPageSelected ? "Deselect page" : "Select all on page"}
              </button>
              {selectedList.length > 0 && (
                <span style={{fontFamily:'var(--font-mono)',fontSize:'0.7rem',color:'var(--cardboard-light)'}}>
                  {selectedList.length} selected total
                </span>
              )}
            </div>
          )}

          {results.map((r, i) => {
            const { artist, title } = parseTitle(r.title);
            const isSelected = !!selected[r.id];
            const match = spotifyMatches[r.id];
            return (
              <React.Fragment key={r.id}>
              <div
                className={`release-card ${isSelected ? 'selected' : ''}`}
                onClick={() => expandCard(r)}
                style={{ animationDelay: `${i * 30}ms` }}
              >
                <div className="release-check" onClick={e => { e.stopPropagation(); toggleSelect(r); }}><CheckIcon /></div>
                {r.thumb ? (
                  <img className="release-thumb" src={r.thumb} alt="" loading="lazy" />
                ) : (
                  <div className="release-thumb" style={{display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1.2rem',color:'var(--border-light)'}}>♫</div>
                )}
                <div className="release-info">
                  <h3>{artist ? <><span style={{color:'var(--cardboard-light)',fontWeight:700}}>{artist}</span> — {title}</> : r.title}</h3>
                  <div className="release-meta">
                    {r.year && <span>{r.year}</span>}
                    {r._orphan && <span style={{color:'var(--cardboard-dark)',fontSize:'0.55rem',fontStyle:'italic'}}>release only</span>}
                    {r.country && <span className="meta-click" onClick={e => { e.stopPropagation(); applyFilter('country', r.country); }}>{r.country}</span>}
                    {r.format && <span>{r.format.join(", ")}</span>}
                    {r.genre && r.genre.map(g => <span key={g} className="meta-click" onClick={e => { e.stopPropagation(); applyFilter('genre', g); }}>{g}</span>)}
                    {r.style && r.style.map(s => <span key={s} className="meta-click" onClick={e => { e.stopPropagation(); applyFilter('style', s); }}>{s}</span>)}
                    {r.label && <span className="meta-click" onClick={e => { e.stopPropagation(); applyFilter('label', r.label[0]); }}>{r.label[0]}</span>}
                  </div>
                </div>
                <div className="release-actions" onClick={e => e.stopPropagation()}>
                  <a className="spotify-link" href="#" onClick={(e) => openSpotifySearch(artist, title, e)} title="Opens app if installed, otherwise web player">♫ Spotify ↗</a>
                  <a className="apple-link" href={appleMusicSearchUrl(artist, title)} target="_blank" rel="noopener">♫ Apple Music ↗</a>
                  <a className="ytmusic-link" href={ytMusicSearchUrl(artist, title)} target="_blank" rel="noopener">♬ YT Music ↗</a>
                  <a className="yt-link" href={ytSearchUrl(artist, title)} target="_blank" rel="noopener">▶ YouTube ↗</a>
                  {r.uri && (
                    <a className="discogs-link" href={discogsUrl(r.uri)} target="_blank" rel="noopener">Discogs ↗</a>
                  )}
                </div>
              </div>
              {expandedId === (r.master_id || r.id) && (
                <div className="card-detail">
                  {detailLoading && !detailCache[r.master_id || r.id] ? (
                    <div className="card-detail-loading"><span className="spinner"></span>Loading tracklist & credits…</div>
                  ) : detailCache[r.master_id || r.id] ? (() => {
                    const d = detailCache[r.master_id || r.id];
                    if (d.error) return <div className="card-detail-loading" style={{color:'var(--red)'}}>Error: {d.error}</div>;
                    return (
                      <div className="detail-columns">
                        <div>
                          <div className="tracklist-header">Tracklist</div>
                          {d.tracklist.length > 0 ? d.tracklist.map((t, ti) => (
                            <div key={ti} className="track-row">
                              <span className="track-pos">{t.position}</span>
                              <span className="track-title meta-click" onClick={(e) => { e.stopPropagation(); searchByTrack(t.title); }}>{t.title}</span>
                              {t.duration && <span className="track-dur">{t.duration}</span>}
                            </div>
                          )) : <div style={{color:'var(--paper-dim)',fontSize:'0.65rem'}}>No tracklist available</div>}
                        </div>
                        <div>
                          <div className="credits-header">Credits</div>
                          {d.extraartists.length > 0 ? d.extraartists.map((ea, ei) => (
                            <div key={ei} className="credit-row">
                              <span className="credit-name" onClick={(e) => { e.stopPropagation(); searchByArtist(ea.name); }}>{ea.name.replace(/\s*\(\d+\)\s*$/, "")}</span>
                              <span className="credit-role">{ea.role}</span>
                            </div>
                          )) : d.artists.length > 0 ? d.artists.map((a, ai) => (
                            <div key={ai} className="credit-row">
                              <span className="credit-name" onClick={(e) => { e.stopPropagation(); searchByArtist(a.name); }}>{a.name.replace(/\s*\(\d+\)\s*$/, "")}</span>
                              <span className="credit-role">Primary artist</span>
                            </div>
                          )) : <div style={{color:'var(--paper-dim)',fontSize:'0.65rem'}}>No credits available</div>}
                        </div>
                      </div>
                    );
                  })() : null}
                </div>
              )}
              </React.Fragment>
            );
          })}

          {!loading && results.length === 0 && (
            <div className="empty">
              <span className="empty-icon">📦</span>
              Set your search criteria and hit Search to start digging.
            </div>
          )}

          {/* Pagination */}
          {pagination && pagination.pages > 1 && (
            <div className="pagination">
              <button className="btn btn-sm" onClick={() => searchDiscogs(page - 1)} disabled={page <= 1 || loading}>
                ← Prev
              </button>
              <span className="page-info">
                Page {page} of {pagination.pages}
              </span>
              <button className="btn btn-sm" onClick={() => searchDiscogs(page + 1)} disabled={page >= pagination.pages || loading}>
                Next →
              </button>
            </div>
          )}
        </div>
      )}

      {/* ═══ SELECTED TAB ═══ */}
      {tab === 'selected' && (
        <div className="results fade-in">
          {selectedList.length === 0 ? (
            <div className="empty">
              <span className="empty-icon">🎯</span>
              No releases selected yet. Go to Results and click to select.
            </div>
          ) : (
            <>
              <div className="select-bar">
                <div style={{display:'flex',gap:'0.5rem'}}>
                  <button className="btn btn-sm btn-spotify" onClick={matchToSpotify} disabled={matching || !spotifyToken}>
                    {matching ? <><span className="spinner"></span>Matching ({matchProgress.done}/{matchProgress.total})</> : "Match to Spotify"}
                  </button>
                  <button className="btn btn-sm btn-danger" onClick={clearSelected}>Clear all</button>
                </div>
                <span style={{fontFamily:'var(--font-mono)',fontSize:'0.7rem',color:'var(--cream-dim)'}}>
                  {matchedCount > 0 && `${matchedCount} matched · ${unmatchedEntries.length} not found`}
                </span>
              </div>

              {matching && (
                <div className="loading-bar">
                  <div className="loading-bar-fill" style={{width: `${(matchProgress.done / matchProgress.total) * 100}%`}} />
                </div>
              )}

              {selectedList.map(([id, release]) => {
                const { artist, title } = parseTitle(release.title);
                const match = spotifyMatches[id];
                return (
                  <div key={id} className="release-card selected" onClick={() => toggleSelect(release)}>
                    <div className="release-check"><CheckIcon /></div>
                    {release.thumb ? (
                      <img className="release-thumb" src={release.thumb} alt="" loading="lazy" />
                    ) : (
                      <div className="release-thumb" style={{display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1.2rem',color:'var(--border-light)'}}>♫</div>
                    )}
                    <div className="release-info">
                      <h3>{artist ? <><span style={{color:'var(--cardboard-light)',fontWeight:700}}>{artist}</span> — {title}</> : release.title}</h3>
                      <div className="release-meta">
                        {release.year && <span>{release.year}</span>}
                        {release.country && <span>{release.country}</span>}
                        {release.format && <span>{release.format.join(", ")}</span>}
                      </div>
                    </div>
                    <div className="release-actions" onClick={e => e.stopPropagation()}>
                      {match === undefined ? (
                        <span className="match-badge match-none">not matched</span>
                      ) : match ? (
                        <a href={match.url} target="_blank" rel="noopener" className="match-badge match-spotify" style={{textDecoration:'none'}}>
                          ♫ {match.artist} — {match.name} ↗
                        </a>
                      ) : (
                        <a className="yt-link" href={ytSearchUrl(artist, title)} target="_blank" rel="noopener">
                          YouTube search ↗
                        </a>
                      )}
                    </div>
                  </div>
                );
              })}
            </>
          )}
        </div>
      )}

      {/* ═══ PLAYLIST TAB ═══ */}
      {tab === 'playlist' && (
        <div className="results fade-in">
          {selectedList.length === 0 ? (
            <div className="empty">
              <span className="empty-icon">🎵</span>
              Select some releases first, then match them to Spotify.
            </div>
          ) : matchedCount === 0 && !matching ? (
            <div className="empty">
              <span className="empty-icon">🔍</span>
              Go to the Selected tab and click "Match to Spotify" first.
            </div>
          ) : (
            <div className="playlist-builder">
              <h3>Create Spotify Playlist</h3>
              <p style={{fontSize:'0.82rem',color:'var(--cream-dim)',marginBottom:'1rem'}}>
                {matchedCount} of {selectedList.length} releases found on Spotify.
                All tracks from matched albums will be added.
              </p>
              <div className="playlist-input-row">
                <input
                  value={playlistName}
                  onChange={e => setPlaylistName(e.target.value)}
                  placeholder={`Crate Digger – ${year || "Mixed"}`}
                />
                <button
                  className="btn btn-spotify"
                  onClick={createPlaylist}
                  disabled={creating || matchedCount === 0}
                >
                  {creating ? <><span className="spinner"></span>Creating…</> : "Create Playlist"}
                </button>
              </div>

              {playlistResult && (
                <div className="success-panel">
                  <p style={{fontSize:'0.9rem',marginBottom:'0.5rem',color:'var(--green)'}}>
                    ✓ Playlist created — {playlistResult.trackCount} tracks added
                  </p>
                  <a href={playlistResult.url} target="_blank" rel="noopener">
                    Open "{playlistResult.name}" in Spotify ↗
                  </a>
                </div>
              )}

              {/* Unmatched releases with YouTube links */}
              {unmatchedEntries.length > 0 && (
                <div className="unmatched-section">
                  <h4>Not on Spotify — YouTube links ({unmatchedEntries.length})</h4>
                  {unmatchedEntries.map(([id, release]) => {
                    const { artist, title } = parseTitle(release.title);
                    return (
                      <div key={id} className="unmatched-item">
                        <span>{artist ? <><strong style={{color:'var(--cream)'}}>{artist}</strong> — {title}</> : release.title}</span>
                        <div style={{display:'flex',gap:'0.4rem',flexWrap:'wrap'}}>
                          <a className="spotify-link" href="#" onClick={(e) => openSpotifySearch(artist, title, e)} title="Opens app if installed, otherwise web player">♫ Spotify ↗</a>
                          <a className="apple-link" href={appleMusicSearchUrl(artist, title)} target="_blank" rel="noopener">Apple Music ↗</a>
                          <a className="ytmusic-link" href={ytMusicSearchUrl(artist, title)} target="_blank" rel="noopener">YT Music ↗</a>
                          <a className="yt-link" href={ytSearchUrl(artist, title)} target="_blank" rel="noopener">YouTube ↗</a>
                          {release.uri && <a className="discogs-link" href={discogsUrl(release.uri)} target="_blank" rel="noopener">Discogs ↗</a>}
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>
</body>
</html>
